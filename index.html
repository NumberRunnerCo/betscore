<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Nick's BetScore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0f; --card: #18181b; --card-alt: #131315;
  --border: #27272a; --border-light: #3f3f46;
  --text: #fafafa; --text-dim: #a1a1aa; --text-muted: #52525b;
  --accent: #5ac8fa; --accent-dim: #3a9fd8;
  --green: #22c55e; --green-bg: rgba(34,197,94,0.12); --green-border: rgba(34,197,94,0.3);
  --yellow: #eab308; --yellow-bg: rgba(234,179,8,0.12); --yellow-border: rgba(234,179,8,0.3);
  --red: #ef4444; --red-bg: rgba(239,68,68,0.12); --red-border: rgba(239,68,68,0.3);
  --gold: #f59e0b;
  --radius: 14px; --radius-sm: 10px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased;
}
.header {
  background: linear-gradient(180deg, rgba(24,24,27,0.98) 0%, rgba(13,13,15,0.95) 100%);
  padding: 16px 16px 10px; text-align: center;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.header-logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 2px; }
.header-logo svg { width: 26px; height: 26px; filter: drop-shadow(0 0 8px rgba(245,158,11,0.3)); }
.header h1 {
  font-size: 20px; font-weight: 900; letter-spacing: 1px;
  background: linear-gradient(135deg, #fafafa 0%, #f59e0b 50%, #d97706 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .sub { font-size: 9px; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; font-weight: 700; opacity: 0.5; }
.status-bar { display: flex; justify-content: center; gap: 6px; padding: 6px 16px; flex-wrap: wrap; }
.pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; color: var(--text-muted); background: rgba(255,255,255,0.03); border: 1px solid var(--border); letter-spacing: 0.3px; }
.pill .dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
.settings-toggle { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 8px; background: transparent; color: var(--text-muted); border: none; font-size: 11px; font-weight: 600; cursor: pointer; letter-spacing: 0.5px; transition: color 0.2s; }
.settings-toggle:hover { color: var(--text-dim); }
.settings-panel { display: none; padding: 0 16px 12px; }
.settings-panel.open { display: block; }
.settings-panel label { font-size: 11px; color: var(--text-dim); display: block; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.settings-panel input { width: 100%; padding: 12px 14px; font-size: 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--card); color: var(--accent); font-family: 'JetBrains Mono', monospace; font-weight: 500; }
.settings-panel input:focus { border-color: var(--accent); outline: none; }
.settings-panel .hint { font-size: 10px; color: var(--text-muted); margin-top: 6px; }
.fetch-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: calc(100% - 32px); margin: 10px auto 6px; padding: 12px;
  background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
  color: #000; border: none; border-radius: var(--radius);
  font-size: 13px; font-weight: 800; cursor: pointer; letter-spacing: 0.5px;
  box-shadow: 0 2px 8px rgba(245,158,11,0.25), inset 0 1px 0 rgba(255,255,255,0.2); transition: all 0.2s;
}
.fetch-btn:hover { box-shadow: 0 4px 16px rgba(245,158,11,0.4); transform: translateY(-1px); }
.fetch-btn:active { transform: scale(0.97) translateY(0); }
.fetch-btn:disabled { background: var(--card); color: var(--text-muted); box-shadow: none; }
.fetch-btn.success { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); box-shadow: 0 2px 8px rgba(34,197,94,0.25), inset 0 1px 0 rgba(255,255,255,0.15); color: #000; }
.action-bar { display: flex; gap: 8px; padding: 0 16px; margin-bottom: 8px; }
.export-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  flex: 1; padding: 10px;
  background: transparent; color: var(--accent);
  border: 1px solid rgba(90,200,250,0.25); border-radius: var(--radius);
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.export-btn:hover { background: rgba(90,200,250,0.08); border-color: rgba(90,200,250,0.4); }
.export-btn:active { transform: scale(0.97); }
.tabs { display: flex; gap: 2px; padding: 4px 12px; background: rgba(255,255,255,0.02); margin: 4px 12px; border-radius: var(--radius); }
.tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 12px; font-weight: 700; color: var(--text-muted); border: none; background: transparent; cursor: pointer; border-radius: var(--radius-sm); transition: all 0.2s; letter-spacing: 0.3px; }
.tab.active { color: var(--gold); background: var(--card); box-shadow: var(--shadow-sm); }
.tab:not(.active):hover { color: var(--text-dim); background: rgba(255,255,255,0.03); }
.sort-bar { display: flex; gap: 6px; padding: 4px 12px 8px; align-items: center; flex-wrap: wrap; }
.sort-label { font-size: 9px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-right: 2px; }
.sort-btn { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; color: var(--text-muted); background: transparent; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; }
.sort-btn:hover { border-color: var(--border-light); color: var(--text-dim); }
.sort-btn.active { color: var(--gold); border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.08); }
.games-list { padding: 8px 12px; }
.game-card { background: var(--card); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; border: 1px solid var(--border); transition: border-color 0.2s, box-shadow 0.2s; }
.game-card:hover { border-color: var(--border-light); box-shadow: var(--shadow-sm); }
.game-card.has-score { border-color: var(--border-light); box-shadow: var(--shadow-md); }
.game-card.compact { padding: 8px 12px; }
.game-card.compact .game-matchup { margin: 4px 0; padding: 4px 0 6px 0 !important; }
.game-card.compact .card-expandable-section { display: none !important; }
.game-card.compact .game-header { margin-bottom: 2px; padding: 6px 0 !important; }
.game-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; font-size: 12px; color: var(--text-dim); font-weight: 600; }
.game-header-left { display: flex; align-items: center; gap: 8px; }
.game-refresh { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; font-size: 14px; line-height: 1; }
.game-refresh:active { color: var(--gold); }
.game-matchup { padding: 6px 14px 10px; }
.team-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
.team-name { font-size: 15px; font-weight: 700; color: var(--text); }
.team-rank { font-size: 10px; font-weight: 800; color: var(--gold); margin-right: 5px; opacity: 0.9; }
.team-record { font-size: 10px; color: var(--text-muted); font-weight: 600; margin-left: 6px; }
.live-score { font-size: 22px; font-weight: 800; color: var(--text); margin-left: auto; font-family: 'JetBrains Mono', monospace; }
.at-symbol { font-size: 10px; color: var(--text-muted); padding: 0 14px; font-weight: 600; letter-spacing: 1px; }
.line-badges { display: flex; gap: 8px; }
.line-badge { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 5px; }
.line-badge.spread { background: rgba(245,158,11,0.1); color: var(--gold); border: 1px solid rgba(245,158,11,0.2); }
.line-badge.total { background: rgba(90,200,250,0.08); color: var(--accent); border: 1px solid rgba(90,200,250,0.2); }
.inputs-section { border-top: 1px solid var(--border); background: var(--card-alt); padding: 10px 14px; }
.inputs-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 8px; }
.inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.inputs-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.input-group label { font-size: 9px; color: var(--text-muted); display: block; margin-bottom: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.input-group input {
  width: 100%; padding: 10px 4px; font-size: 15px; font-weight: 700;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--bg); color: white; text-align: center;
  font-family: 'JetBrains Mono', monospace; -webkit-appearance: none;
}
.input-group input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 3px rgba(255,159,10,0.15); }
.input-group input::placeholder { color: var(--text-muted); font-weight: 500; }
.input-group input.locked { color: var(--text-dim); border-style: dashed; }
.input-group input.current-spread { color: var(--gold); }
.input-group input.current-total { color: var(--accent); }
.diff-box {
  width: 100%; padding: 10px 4px; font-size: 15px; font-weight: 700;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--bg); text-align: center; font-family: 'JetBrains Mono', monospace;
}
.best-line-section { padding: 8px 14px; border-top: 1px solid var(--border); background: var(--card-alt); }
.best-line-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
.best-line-side { font-size: 11px; font-weight: 700; color: var(--text-dim); min-width: 50px; }
.best-line-info { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; }
.best-book { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
.bs-section { border-top: 1px solid rgba(245,158,11,0.3); background: linear-gradient(180deg, rgba(245,158,11,0.08) 0%, rgba(245,158,11,0.02) 100%); padding: 14px; }
.bs-section-label { font-size: 9px; font-weight: 800; letter-spacing: 2.5px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; text-align: center; opacity: 0.8; }
.bs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.bs-card { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 10px; border: 1px solid var(--border); text-align: center; transition: border-color 0.2s; }
.bs-card:hover { border-color: var(--border-light); }
.bs-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.bs-side-label { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
.checks { display: flex; gap: 3px; }
.check { width: 16px; height: 16px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; }
.check.on { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.check.off { background: var(--card); color: var(--text-muted); border: 1px solid var(--border); opacity: 0.3; }
.bs-scores { display: flex; align-items: baseline; justify-content: center; gap: 8px; margin: 4px 0; }
.bs-locked-wrap { text-align: center; }
.bs-locked-label { font-size: 7px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
.bs-locked-num { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--text-dim); }
.bs-live-wrap { text-align: center; }
.bs-live-label { font-size: 7px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); }
.bs-live-num { font-family: 'JetBrains Mono', monospace; font-size: 30px; font-weight: 900; text-shadow: 0 0 20px currentColor; letter-spacing: -1px; }
.verdict-chip { font-size: 10px; font-weight: 900; padding: 4px 14px; border-radius: 6px; letter-spacing: 1.5px; display: inline-block; margin-top: 4px; }
.verdict-max { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #000; border: none; box-shadow: 0 2px 8px rgba(245,158,11,0.35); }
.verdict-play { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.verdict-lean { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
.verdict-pass { color: var(--text-muted); background: rgba(255,255,255,0.03); border: 1px solid var(--border); }
.c-green { color: var(--green); } .c-yellow { color: var(--yellow); } .c-red { color: var(--red); }
.section-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 2px; margin-bottom: 6px; }
.section-title { font-size: 13px; font-weight: 800; color: var(--text-dim); letter-spacing: 0.3px; }
.section-badge { font-size: 9px; padding: 3px 8px; border-radius: 5px; background: rgba(255,255,255,0.03); color: var(--text-muted); font-weight: 700; border: 1px solid var(--border); letter-spacing: 0.3px; }
.summary-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: linear-gradient(180deg, rgba(13,13,15,0.85) 0%, rgba(13,13,15,0.98) 30%);
  backdrop-filter: blur(20px) saturate(1.4); -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 10px 20px 10px; display: flex; justify-content: space-around;
}
.summary-stat { text-align: center; }
.summary-stat .val { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 800; }
.summary-stat .lbl { font-size: 8px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }
.empty-state { text-align: center; padding: 48px 24px; }
.empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.6; }
.empty-title { font-size: 16px; font-weight: 700; color: var(--text-dim); margin-bottom: 6px; }
.empty-sub { font-size: 12px; color: var(--text-muted); }
.history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--card); margin-bottom: 1px; border-radius: var(--radius-sm); }
.history-game { font-size: 13px; font-weight: 600; }
.history-detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.history-badge { font-size: 11px; font-weight: 800; padding: 4px 12px; border-radius: 6px; letter-spacing: 0.5px; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
.status-text { text-align: center; font-size: 11px; color: var(--text-muted); padding: 0 16px 8px; font-weight: 500; }
.content { padding-bottom: 80px; }
.warning-bar { padding: 8px 16px; font-size: 11px; text-align: center; font-weight: 600; background: var(--red-bg); color: var(--red); border-bottom: 1px solid var(--red-border); }
.poly-section { padding: 12px 14px; border-top: 1px solid rgba(139,92,246,0.2); background: linear-gradient(180deg, rgba(139,92,246,0.04) 0%, var(--card-alt) 100%); }
.poly-header { display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
.poly-label { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: #8b5cf6; }
.poly-teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.poly-team { display: flex; align-items: baseline; gap: 6px; }
.poly-team-name { font-size: 13px; font-weight: 700; color: var(--text); }
.poly-team-pct { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 900; }
.poly-track { position: relative; width: 100%; height: 32px; border-radius: 8px; overflow: hidden; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); }
.poly-fill-left { position: absolute; top: 0; left: 0; height: 100%; border-radius: 7px 0 0 7px; transition: width 0.6s ease; }
.poly-fill-right { position: absolute; top: 0; right: 0; height: 100%; border-radius: 0 7px 7px 0; transition: width 0.6s ease; }
.poly-center-mark { position: absolute; top: 0; bottom: 0; left: 50%; width: 1px; background: rgba(255,255,255,0.18); z-index: 2; }
.poly-fill-label { position: absolute; top: 50%; transform: translateY(-50%); font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 900; color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.6); z-index: 3; }
.poly-fill-label.left { left: 10px; }
.poly-fill-label.right { right: 10px; }
.poly-footer { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 8px; }
.poly-vol-badge { font-size: 12px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #a78bfa; background: rgba(139,92,246,0.12); padding: 3px 10px; border-radius: 6px; border: 1px solid rgba(139,92,246,0.2); }
.poly-vol-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
.splits-panel { margin: 6px 16px; border-radius: var(--radius); border: 1px solid rgba(245,158,11,0.15); overflow: hidden; background: var(--card); }
.splits-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; background: linear-gradient(180deg, rgba(245,158,11,0.05) 0%, var(--card) 100%); transition: background 0.2s; }
.splits-header:hover { background: linear-gradient(180deg, rgba(245,158,11,0.08) 0%, var(--card) 100%); }
.splits-header-left { display: flex; align-items: center; gap: 8px; }
.splits-header-icon { font-size: 18px; }
.splits-header-title { font-size: 13px; font-weight: 800; color: #f59e0b; letter-spacing: 0.5px; }
.splits-header-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 10px; }
.splits-body { padding: 12px 14px; border-top: 1px solid var(--border); }
.splits-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.splits-btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 8px; border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.splits-btn:active { transform: scale(0.97); }
.splits-btn:disabled { background: var(--card-alt); color: var(--text-muted); box-shadow: none; }
.splits-btn.primary { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #000; box-shadow: 0 2px 8px rgba(245,158,11,0.25); }
.splits-btn.secondary { background: var(--card-alt); color: var(--text-dim); border: 1px solid var(--border); }
.splits-btn.success { background: linear-gradient(135deg, #34c759 0%, #2da44e 100%); color: #000; }
.paste-area { width: 100%; min-height: 100px; padding: 10px; font-size: 11px; line-height: 1.5; font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); border: 1px dashed rgba(245,158,11,0.35); border-radius: var(--radius-sm); resize: vertical; margin-bottom: 8px; }
.paste-area:focus { border-color: #f59e0b; border-style: solid; outline: none; box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }
.paste-area::placeholder { color: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 11px; line-height: 1.6; }
.splits-result { font-size: 11px; text-align: center; padding: 8px 10px; font-weight: 600; border-radius: var(--radius-sm); margin-top: 8px; }
.splits-result.good { color: var(--green); background: var(--green-bg); border: 1px solid var(--green-border); }
.splits-result.warn { color: var(--yellow); background: var(--yellow-bg); border: 1px solid var(--yellow-border); }
.splits-result.bad { color: var(--red); background: var(--red-bg); border: 1px solid var(--red-border); }
.splits-result.info { color: var(--text-dim); background: var(--card-alt); border: 1px solid var(--border); }
.splits-auto-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 6px; border-radius: 3px; background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); margin-left: 6px; }
.splits-debug { margin-top: 8px; padding: 8px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); max-height: 120px; overflow-y: auto; }
.splits-debug-line { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-muted); line-height: 1.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.splits-debug-line.match { color: var(--green); }

// Worker URL — hardcoded default, can be overridden in Settings
const DEFAULT_WORKER_URL = 'https://betscore-proxy.coloradobetting.workers.dev';

  try { const v = localStorage.getItem('nick-workerUrl'); return v ? JSON.parse(v) : DEFAULT_WORKER_URL; } catch(e) { return DEFAULT_WORKER_URL; }
};

const fetchWithFallback = async (url, timeoutMs) => {
  const tm = timeoutMs || 8000;
  const withTimeout = (promise) => Promise.race([promise, new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), tm))]);
  const workerUrl = getWorkerUrl();
  const methods = [
    () => fetch(url), // Try direct first (works for ESPN, Odds API)
  ];
  // If worker URL is configured, use it as priority fallback
  if (workerUrl) {
    methods.splice(1, 0, () => fetch(workerUrl + '?url=' + encodeURIComponent(url)));
  }
  // Free public proxies as last resort
  methods.push(
    () => fetch('https://corsproxy.io/?' + encodeURIComponent(url)),
    () => fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url)),
    () => fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url)),
  );
  for (let i = 0; i < methods.length; i++) {
    try { const r = await withTimeout(methods[i]()); if (r.ok) return r; } catch(e) {}
  }
  throw new Error('All fetch methods failed');
};

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, errorInfo) {
    console.error('[ErrorBoundary] Caught error:', error, errorInfo);
  }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ padding: '16px', background: 'rgba(255,69,58,0.1)', border: '1px solid rgba(255,69,58,0.3)', borderRadius: '12px', margin: '8px 12px' }}>
          <div style={{ color: '#ff453a', fontSize: '12px', fontWeight: 700, marginBottom: '6px' }}>Something went wrong with this game card</div>
          <button onClick={() => this.setState({ hasError: false })} style={{ padding: '6px 12px', background: '#ff453a', color: '#fff', border: 'none', borderRadius: '6px', fontSize: '11px', fontWeight: 600, cursor: 'pointer' }}>
            Retry
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}


function App() {
  const [sport, setSport] = useState(load('sport', 'basketball_ncaab'));

  const [settingsOpen, setSettingsOpen] = useState(false);
  const [remaining, setRemaining] = useState(load('remaining', '?'));
  const [lastFetch, setLastFetch] = useState(load('lastFetch', ''));
  const [polyData, setPolyData] = useState({});
  const [polyStatus, setPolyStatus] = useState('');
  const [splitsStatus, setSplitsStatus] = useState('');
  const [splitsOpen, setSplitsOpen] = useState(false);
  const [splitsLoading, setSplitsLoading] = useState(false);
  const [pasteText, setPasteText] = useState('');
  const [splitsLog, setSplitsLog] = useState([]);
  const [splitsSourceStatus, setSplitsSourceStatus] = useState({});
  const [splitsMatchCount, setSplitsMatchCount] = useState(0);
  const [sharpRecords, setSharpRecords] = useState(load('sharpRecords-' + sport, { wins: 0, losses: 0, pushes: 0, clvBeats: 0, clvMisses: 0, history: [] }));
  const [expandedCards, setExpandedCards] = useState({});
  const [sharpOnlyFilter, setSharpOnlyFilter] = useState(false);
  const [notificationsEnabled, setNotificationsEnabled] = useState(load('notificationsEnabled', true));
  const [workerUrl, setWorkerUrl] = useState(load('workerUrl', DEFAULT_WORKER_URL));
  const [oddsCache, setOddsCache] = useState({});
  const oddsCacheRef = useRef({});
  const [lastFetchTimestamp, setLastFetchTimestamp] = useState(0);
  const lastFetchTimestampRef = useRef(0);
  const addSplitsLog = (msg, type) => { setSplitsLog(prev => [...prev.slice(-30), { msg, type: type || 'info', t: Date.now() }]); };
  // Feature 1: Auto-Refresh Timer
  const [autoRefreshEnabled, setAutoRefreshEnabled] = useState(load('autoRefresh', true));
  const [countdown, setCountdown] = useState('');
  // Feature 3: Compact Mode
  const [compactMode, setCompactMode] = useState(load('compactMode', false));
  // Feature 4: ROI Tracking
  const [roiStats, setRoiStats] = useState(load('roiStats-' + sport, { totalWagered: 0, totalReturn: 0, bets: 0 }));

  const [lineAlertThreshold, setLineAlertThreshold] = useState(load('lineAlertThreshold', 1.0));


  useEffect(() => { save('sport', sport); }, [sport]);
  useEffect(() => { save('apiKey', apiKey); }, [apiKey]);
  useEffect(() => { save('games-' + sport, games); }, [games, sport]);
  useEffect(() => { save('gameData-' + sport, gameData); }, [gameData, sport]);
  useEffect(() => { save('bets-' + sport, bets); }, [bets, sport]);
  useEffect(() => { save('history-' + sport, history); }, [history, sport]);
  useEffect(() => { save('remaining', remaining); }, [remaining]);
  useEffect(() => { save('lastFetch', lastFetch); }, [lastFetch]);
  useEffect(() => { save('pinned-' + sport, pinnedGames); }, [pinnedGames, sport]);

  useEffect(() => { save('notificationsEnabled', notificationsEnabled); }, [notificationsEnabled]);

  const didAutoFetch = useRef(false);

  // ── 5 AM ET daily auto-refresh ──
  const lastAutoDay = useRef(load('lastAutoDay', ''));
  useEffect(() => {
    const checkDailyRefresh = () => {
      // Get current time in Eastern
      const now = new Date();
      const etStr = now.toLocaleString('en-US', { timeZone: 'America/New_York' });
      const et = new Date(etStr);
      const etHour = et.getHours();
      const etDate = et.toISOString().slice(0, 10);
      // If it's 5 AM ET or later AND we haven't refreshed today
      if (etHour >= 5 && lastAutoDay.current !== etDate) {
        lastAutoDay.current = etDate;
        save('lastAutoDay', etDate);
        console.log('[AutoRefresh] 5 AM ET new day — clearing old data & fetching fresh games');
        // Clear old game data for fresh slate, then fetch
        save('gameData-' + sport, {});
        setGameData(() => {
          // Use updater form to ensure this completes before next render
          // fetchGames will read from fresh state via its own setGameData(prev => ...)
          return {};
        });
        // Delay fetch slightly to let React process the state clear
        setTimeout(() => fetchGames(), 100);
      }
    };
    // Check immediately on load
    checkDailyRefresh();
    // Then check every 5 minutes
    const timer = setInterval(checkDailyRefresh, 5 * 60 * 1000);
    return () => clearInterval(timer);
  }, [apiKey]);


  // ── Feature 1: Auto-Refresh Countdown Timer ──
  useEffect(() => {
    if (!autoRefreshEnabled) {
      setCountdown('');
      return;
    }
    const updateCountdown = () => {
      const lastFetch = lastFetchTimestampRef.current;

        return;
      }
      const elapsed = Date.now() - lastFetch;
      const cooldownMs = 5 * 60 * 1000; // 5 minutes
      const remaining = Math.max(0, cooldownMs - elapsed);
      if (remaining <= 0) {
        setCountdown('Ready');
        if (autoRefreshEnabled) {
          fetchGames();
          lastFetchTimestampRef.current = Date.now();
        }
      } else {

    updateCountdown();
    const timer = setInterval(updateCountdown, 1000);

  const abortRef = useRef(null);


  // ── Polymarket CBB fetch ──

    const log = (msg, data) => console.log('[Poly] ' + msg, data !== undefined ? data : '');
    setPolyStatus('loading...');
    const BASE = 'https://gamma-api.polymarket.com';


    // Step 0: Find a working CORS proxy first with a simple test

    const workerUrl = getWorkerUrl();
    const proxies = [

    // Worker as priority proxy if configured
    if (workerUrl) proxies.splice(1, 0, (u) => workerUrl + '?url=' + encodeURIComponent(u));

    );
    const testUrl = BASE + '/sports';
    for (let i = 0; i < proxies.length; i++) {
      try {
        log('Testing proxy ' + i + '...');
        const r = await Promise.race([
          fetch(proxies[i](testUrl)),
          new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 5000))
        ]);
        if (r.ok) {
          const text = await r.text();
          if (text && text.length > 10) {
            workingProxy = i;
            log('Proxy ' + i + ' works! Response length: ' + text.length);
            // Parse sports response while we have it
            var sportsData = null;
            try {
              sportsData = JSON.parse(text);
            } catch(e) { log('Sports JSON parse error: ' + e.message); }
            break;
          }
        }
      } catch(e) { log('Proxy ' + i + ' failed: ' + e.message); }
    }
    if (workingProxy === null) {
      log('No working proxy found');
      setPolyStatus('no proxy');
      return {};
    }


    // Fast fetch using the working proxy
    const pFetch = async (url, label) => {
      log('Fetch: ' + label);
      try {
        const r = await Promise.race([
          fetch(proxies[workingProxy](url)),
          new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 8000))
        ]);
        if (!r.ok) { log(label + ' HTTP ' + r.status); return null; }
        const text = await r.text();
        if (!text || text.length < 3) return null;
        try { const j = JSON.parse(text); log(label + ' OK (' + text.length + ' bytes)'); return j; } catch(e) { log(label + ' not JSON: ' + text.substring(0,100)); return null; }
      } catch(e) { log(label + ' err: ' + e.message); return null; }
    };


    try {
      // Step 1: Find series_id for the active sport from sports data
      const sportCfg = SPORT_CONFIG[sport];
      const polyRegex = sportCfg && sportCfg.polySlug ? sportCfg.polySlug : null;
      if (!polyRegex) {
        log('No Polymarket slug configured for ' + (sportCfg ? sportCfg.name : sport));
        setPolyStatus('not configured');
        return {};
      }
      let seriesId = null;
      const sports = sportsData || await pFetch(BASE + '/sports', '/sports');
      if (sports) {
        const arr = Array.isArray(sports) ? sports : (sports.data || sports.sports || []);
        log('Sports count: ' + arr.length);
        for (const s of arr) {
          const sl = (s.slug || '').toLowerCase();
          const nm = (s.name || s.label || s.title || '').toLowerCase();
          log('  ' + sl + ' | ' + nm + ' | id=' + (s.seriesId || s.series_id || s.id || '?'));
          if (polyRegex.test(sl + ' ' + nm)) {
            seriesId = s.seriesId || s.series_id || s.id;
            log(sportCfg.name + ' seriesId: ' + seriesId);
            break;
          }
        }

    if (t < 10 && m < 10) return { valid: false, confidence: 'none', reason: 'both under 10 - likely record/ranking numbers' };
    if (t > 90 && m > 90) return { valid: false, confidence: 'none', reason: 'both over 90 - likely noise' };
    if (t < 5 || m < 5) return { valid: false, confidence: 'none', reason: 'value under 5% - likely noise' };

    let reason = 'ok';
    if (t < 15 || t > 85 || m < 15 || m > 85) { confidence = 'medium'; reason = 'edge values'; }

      for (const s of scripts) {

        const patterns = [
          /__NEXT_DATA__\s*=\s*({[\s\S]+?})\s*;?\s*$/m,
          /window\.__data\s*=\s*({[\s\S]+?})\s*;?\s*$/m,
        ];
        for (const re of patterns) {
          const m = t.match(re);
          if (m) {
            try {
              const j = JSON.parse(m[1]);
              slog('Found embedded JSON', 'info');
              const search = (obj, d) => {
                if (d > 8 || !obj) return [];
                let f = [];
                if (Array.isArray(obj) && obj.length > 0 && typeof obj[0] === 'object') {
                  const ks = Object.keys(obj[0]).join(' ').toLowerCase();
                  if (/ticket|money|handle|bets|consensus|pct/.test(ks)) f.push(obj);
                }
                if (typeof obj === 'object') {
                  for (const v of Object.values(obj)) f = f.concat(search(v, d + 1));
                }
                return f;
              };
              const arrs = search(j, 0);
              for (const arr of arrs) {
                const txt = arr.map(item => Object.values(item).filter(v => typeof v === 'string' || typeof v === 'number').join('\t')).join('\n');
                const r = parseSplitsText(txt, gamesList, mlPrimary);
                if (Object.keys(r).length > 0) return r;
              }
            } catch(e) {}
          }
        }
      }


      // 2. Try table rows
      const rows = doc.querySelectorAll('tr');
      if (rows.length > 2) {
        slog(rows.length + ' table rows found', 'info');
        let tableText = '';
        rows.forEach(r => {
          const cells = Array.from(r.querySelectorAll('td, th')).map(c => (c.innerText || c.textContent || '').trim());
          // Detect stacked-pair format: cells with \n inside (e.g. VSiN/DK puts Team1\nTeam2 in each cell)
          const hasStacked = cells.some(c => c.includes('\n'));
          if (hasStacked) {
            // Split each cell by newline and create separate sub-rows (one per team)
            const splitCells = cells.map(c => c.split('\n').map(s => s.trim()));
            const maxSubRows = Math.max(...splitCells.map(sc => sc.length));
            for (let sr = 0; sr < maxSubRows; sr++) {
              const subRow = splitCells.map(sc => sc[sr] || '');
              if (subRow.some(x => x.trim())) tableText += subRow.join('\t') + '\n';
            }
          } else {
            tableText += cells.join('\t') + '\n';
          }
        });
        const r = parseSplitsText(tableText, gamesList, mlPrimary);
        if (Object.keys(r).length > 0) return r;
      }


      // 3. Try consensus/matchup divs
      const divs = doc.querySelectorAll('[class*="consensus"], [class*="picks"], [class*="split"], [class*="matchup"], [class*="game"], [class*="event"], [class*="row"]');
      if (divs.length > 0) {
        slog(divs.length + ' matchup elements', 'info');
        let divText = '';
        divs.forEach(d => { divText += (d.innerText || d.textContent || '').trim() + '\n'; });
        const r = parseSplitsText(divText, gamesList, mlPrimary);
        if (Object.keys(r).length > 0) return r;
      }


      // 4. Full body text
      const bodyText = doc.body ? (doc.body.innerText || doc.body.textContent || '') : '';
      slog('Body: ' + bodyText.length + ' chars', 'info');
      if (bodyText.length > 50) return parseSplitsText(bodyText, gamesList, mlPrimary);
    } catch(e) { slog('Parse error: ' + e.message, 'err'); }
    return {};
  };


  // ── Auto-fetch betting splits from public sources ──
  const fetchBettingSplits = async (gamesList, isManual) => {
    const slog = (msg, type) => { addSplitsLog(msg, type); console.log('[Splits] ' + msg); };
    setSplitsLoading(true);
    setSplitsStatus('searching...');
    setSplitsLog([]);
    slog('Fetching splits for ' + gamesList.length + ' games', 'info');


    const cfg = SPORT_CONFIG[sport];
    const sources = cfg && cfg.splitsSources ? cfg.splitsSources : [];
    if (sources.length === 0) {
      slog('No splits sources configured for ' + (cfg ? cfg.name : sport), 'err');
      setSplitsStatus('no sources');
      setSplitsLoading(false);
      return {};
    }


    const srcStatus = {};
    sources.forEach(s => { srcStatus[s.name] = 'waiting'; });
    setSplitsSourceStatus({...srcStatus});


    let allResults = {};
    // Collect results from all sources per game ID
    let perGameSources = {};


    for (const src of sources) {
      try {
        srcStatus[src.name] = 'fetching...';
        setSplitsSourceStatus({...srcStatus});
        setSplitsStatus(src.name + '...');
        slog('Trying ' + src.name + '...', 'info');


        const html = await fetchHtml(src.url);
        slog(src.name + ': ' + html.length + ' bytes', 'info');
        srcStatus[src.name] = 'parsing...';
        setSplitsSourceStatus({...srcStatus});


        const data = parseHtmlForSplits(html, gamesList, slog, SPORT_CONFIG[sport]?.mlPrimary);
        const count = Object.keys(data).length;


        if (count > 0) {
          slog(src.name + ': ' + count + ' games matched!', 'match');
          srcStatus[src.name] = count + ' games';
          setSplitsSourceStatus({...srcStatus});
          // Collect ALL results from this source
          for (const [id, val] of Object.entries(data)) {
            if (!perGameSources[id]) perGameSources[id] = [];
            perGameSources[id].push({ ...val, source: src.name });
          }
        } else {
          slog(src.name + ': 0 matches', 'err');
          srcStatus[src.name] = '0 matches';
          setSplitsSourceStatus({...srcStatus});
        }
      } catch(e) {
        slog(src.name + ': ' + e.message, 'err');
        srcStatus[src.name] = 'failed';
        setSplitsSourceStatus({...srcStatus});
      }
    }

    // Average results across sources — normalize all to HOME side first
    for (const [gameId, sources_array] of Object.entries(perGameSources)) {
      // Normalize every source to home-team perspective before comparing
      const normalized = sources_array.map(src => {
        const t = parseInt(src.tickets) || 0;
        const m = parseInt(src.money) || 0;
        const homeT = src.side === 'home' ? t : 100 - t;
        const homeM = src.side === 'home' ? m : 100 - m;
        return { ...src, homeTickets: homeT, homeMoney: homeM };
      });

      if (normalized.length === 1) {
        allResults[gameId] = { tickets: String(normalized[0].homeTickets), money: String(normalized[0].homeMoney), side: 'home', confidence: 'high', _sourceCount: 1, source: normalized[0].source };
      } else {
        // Log each source's values for sanity checking
        const srcDetails = normalized.map(s => s.source + ':T' + s.homeTickets + '/M' + s.homeMoney).join(', ');
        slog('Game ' + gameId + ' sources: ' + srcDetails, 'info');

        let validSources = [...normalized];

        // Calculate initial average to detect outliers
        let sumT = 0, sumM = 0;
        for (const s of validSources) { sumT += s.homeTickets; sumM += s.homeMoney; }
        let avgT = Math.round(sumT / validSources.length);
        let avgM = Math.round(sumM / validSources.length);

        // Detect flipped sources: if a source disagrees by 30+ pts AND flipping it brings it close, it's likely backwards
        for (const s of validSources) {
          const diff = Math.abs(s.homeTickets - avgT);
          const flippedDiff = Math.abs((100 - s.homeTickets) - avgT);
          if (validSources.length >= 3 && diff > 30 && flippedDiff < 15) {
            slog('Game ' + gameId + ': FLIP DETECTED — ' + s.source + ' has T:' + s.homeTickets + ' but avg is ' + avgT + '. Flipping.', 'err');
            s.homeTickets = 100 - s.homeTickets;
            s.homeMoney = 100 - s.homeMoney;
          }
        }

        // Recalculate after flip corrections
        sumT = 0; sumM = 0;
        for (const s of validSources) { sumT += s.homeTickets; sumM += s.homeMoney; }
        avgT = Math.round(sumT / validSources.length);
        avgM = Math.round(sumM / validSources.length);

        // Exclude remaining outliers (20+ pts from average)
        const outliers = validSources.filter(s => Math.abs(s.homeTickets - avgT) > 20);
        if (outliers.length > 0 && outliers.length < validSources.length) {
          for (const o of outliers) {
            slog('Game ' + gameId + ': Excluding outlier ' + o.source + ' T:' + o.homeTickets + ' (avg ' + avgT + ')', 'info');
          }
          validSources = validSources.filter(s => Math.abs(s.homeTickets - avgT) <= 20);
        }
        // Guard against empty array after exclusions
        if (validSources.length === 0) {
          slog('Game ' + gameId + ': All sources excluded — skipping', 'err');
          continue;
        }
        sumT = 0; sumM = 0;
        for (const s of validSources) { sumT += s.homeTickets; sumM += s.homeMoney; }
        avgT = Math.round(sumT / validSources.length);
        avgM = Math.round(sumM / validSources.length);

        const count = validSources.length;
        const ticketsVar = Math.max(...validSources.map(s => Math.abs(s.homeTickets - avgT)));
        const moneyVar = Math.max(...validSources.map(s => Math.abs(s.homeMoney - avgM)));
        let confidence = 'high';
        if (ticketsVar > 5 || moneyVar > 5) confidence = 'medium';
        if (ticketsVar > 10 || moneyVar > 10) confidence = 'low';

        // Sanity warning: log when sources still disagree significantly
        if (ticketsVar > 15 || moneyVar > 15) {
          slog('Game ' + gameId + ': WARNING — sources disagree (var T:' + ticketsVar + ' M:' + moneyVar + '). Check console for details.', 'err');
          console.warn('[Splits] Disagreement for ' + gameId + ':', normalized.map(s => s.source + '→T:' + s.homeTickets + '/M:' + s.homeMoney));
        }

        allResults[gameId] = {
          tickets: String(avgT),
          money: String(avgM),
          side: 'home',
          confidence: confidence,
          _sourceCount: count,
          source: validSources.map(s => s.source).join('+')
        };
        slog('Game ' + gameId + ': Averaged ' + count + ' sources → T:' + avgT + '% M:' + avgM + '% (' + confidence + ')', 'info');
      }
    }


    const total = Object.keys(allResults).length;
    setSplitsMatchCount(total);
    if (total > 0) {
      setSplitsStatus(total + '/' + gamesList.length + ' auto-filled');
      slog('Done! ' + total + ' games auto-filled', 'match');
    } else {
      setSplitsStatus('0 auto — paste below');
      slog('No auto-data found. Use paste feature.', 'err');
    }
    setSplitsLoading(false);
    return allResults;
  };


  // ML to implied probability conversion
  const mlToProb = (ml) => {
    if (ml == null) return null;
    return ml < 0 ? Math.abs(ml) / (Math.abs(ml) + 100) : 100 / (ml + 100);
  };
  // Convert ML probability movement to pseudo-spread value for BetScore
  const probToSpreadEquiv = (probDelta) => probDelta * 25; // 2% shift ≈ 0.5 spread pts equivalent


  // ── Apply splits data to game inputs ──
  const applySplitsToGames = (splitsData, overwrite) => {
    if (!splitsData || Object.keys(splitsData).length === 0) return 0;
    let filled = 0;
    setGameData(prev => {
      const next = { ...prev };
      for (const [gameId, splits] of Object.entries(splitsData)) {
        if (next[gameId]) {
          const gd = next[gameId];
          // Don't auto-update splits for locked (live/final) games — only manual overwrite allowed
          if (gd._closingLocked && !overwrite) continue;
          if (splits.side !== 'home' && splits.side !== 'away') {
            console.log('[Splits] BLOCKED: game ' + gameId + ' has invalid side: ' + splits.side);
            continue;
          }
          if (overwrite || gd.tickets === '' || gd.tickets == null) {
            const finalT = splits.side === 'home' ? parseInt(splits.tickets) : 100 - parseInt(splits.tickets);
            const finalM = splits.side === 'home' ? parseInt(splits.money) : 100 - parseInt(splits.money);
            const isBad = isNaN(finalT) || isNaN(finalM) || (finalT < 10 && finalM < 10) || finalT < 5 || finalM < 5 || (finalT > 95 && finalM > 95);
            if (isBad) {
              console.log('[Splits] BLOCKED: game ' + gameId + ' T=' + finalT + ' M=' + finalM);
            } else {
              gd.tickets = String(finalT);
              gd.money = String(finalM);
              gd._autoTickets = String(finalT);
              gd._autoMoney = String(finalM);
              gd._manualEdit = false;
              gd._splitsSource = splits.source || 'auto';
              let conf = splits.confidence || 'unknown';
              if (finalT < 15 || finalT > 85 || finalM < 15 || finalM > 85) conf = 'medium';
              if (Math.abs(finalT - finalM) > 45) conf = 'low';
              gd._splitsConfidence = conf;
              filled++;
              // Calculate RLM: line moved toward team but public money is opposite
              let homeLineMove;
              if (gd.isMlPrimary && gd.openHomeProb != null && gd.homeProb != null) {
                homeLineMove = probToSpreadEquiv(gd.homeProb - gd.openHomeProb);
              } else {
                homeLineMove = (parseFloat(gd.homeOpenLine) || 0) - (parseFloat(gd.homeCurrentLine) || 0);
              }
              const ticketsPct = parseFloat(finalT) || 0;
              if (homeLineMove > 0 && ticketsPct > 50) {
                gd.rlmSide = 'away';
              } else if (homeLineMove < 0 && ticketsPct < 50) {
                gd.rlmSide = 'home';
              } else {
                gd.rlmSide = null;
              }
            }
          }
        }
      }
      return next;
    });
    return filled;
  };


  // ── Handle paste submit ──
  const handlePasteSubmit = () => {
    if (!pasteText.trim()) return;
    const slog = (msg, type) => { addSplitsLog(msg, type); console.log('[Splits:Paste] ' + msg); };
    slog('Parsing pasted text (' + pasteText.length + ' chars)', 'info');
    const results = parseSplitsText(pasteText, games, SPORT_CONFIG[sport]?.mlPrimary);
    const count = Object.keys(results).length;
    if (count > 0) {
      for (const id of Object.keys(results)) results[id].source = 'paste';
      applySplitsToGames(results, true);
      setSplitsMatchCount(prev => prev + count);
      setSplitsStatus(count + ' pasted!');
      slog(count + ' games matched from paste!', 'match');
      setPasteText('');

      setSplitsStatus('0 matches in paste');
      slog('No matches. Check format.', 'err');
    }
  };


  // ── Manual fetch / clear splits ──
  const handleManualFetchSplits = async () => {

    if (Object.keys(data).length > 0) applySplitsToGames(data, true);
  };


  const clearSplits = () => {
    setGameData(prev => {
      const next = { ...prev };

  const fetchGames = useCallback(async (force) => {
    // Cooldown: 5 minutes between fetches (unless forced)
    const now = Date.now();
    const cooldownMs = 5 * 60 * 1000;
    const lastTs = lastFetchTimestampRef.current;

      const secsLeft = Math.ceil((cooldownMs - (now - lastTs)) / 1000);
      const minsLeft = Math.floor(secsLeft / 60);
      const secsPart = secsLeft % 60;

      return;
    }

    abortRef.current = controller;

    setStatus('Fetching ' + SPORT_CONFIG[sport].name + ' games...');
    try {
      const cfg = SPORT_CONFIG[sport];
      const today = new Date();
      const dateStr = today.getFullYear() + String(today.getMonth()+1).padStart(2,'0') + String(today.getDate()).padStart(2,'0');
      let espnUrl = 'https://site.api.espn.com/apis/site/v2/sports/' + cfg.espn + '/scoreboard?dates=' + dateStr + '&limit=200';
      if (cfg.groups) espnUrl += '&groups=' + cfg.groups;
      const res = await fetchWithFallback(espnUrl);
      const data = await res.json();
      const events = data.events || [];


      const gamesList = events.filter(ev => ev.competitions && ev.competitions.length > 0 && ev.competitions[0].competitors && ev.competitions[0].competitors.length >= 2).map(ev => {
        const comp = ev.competitions[0];

            // Call Odds API directly (it supports CORS) — don't use proxy chain or headers get stripped

              ]);
            } catch(directErr) {

            const rem = oddsRes.headers.get('x-requests-remaining');

                const usageRem = usageRes.headers.get('x-requests-remaining');

            }
            oddsData = await oddsRes.json();
            // Cache the result
            if (Array.isArray(oddsData)) {

              setOddsCache(oddsCacheRef.current);

          if (oddsData && oddsData.message) {

              for (const bk of (g.bookmakers || [])) {

                if (sm) {

              }

      const applyAlias = (name) => {

            save('history-' + sport, history);
            save('pinned-' + sport, pinnedGames);

                alert('✅ Worker is working! Response: ' + text.length + ' bytes');

                alert('❌ Worker returned HTTP ' + r.status);
              }
            } catch(e) { alert('❌ Worker unreachable: ' + e.message); }

              _version: 2,
              sport: sport,
              games: games,
              gameData: gameData,
              sharpRecords: sharpRecords,
              roiStats: roiStats,
              history: history,
              bets: bets,
              pinnedGames: pinnedGames,
              apiKey: apiKey,
              workerUrl: workerUrl

            const blob = new Blob([json], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'betscore-backup-' + new Date().toISOString().split('T')[0] + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

              try {
                const backup = JSON.parse(evt.target.result);
                if (backup.sport) setSport(backup.sport);
                if (backup.games) setGames(backup.games);
                setGameData(backup.gameData || {});
                setSharpRecords(backup.sharpRecords || { wins: 0, losses: 0, pushes: 0, clvBeats: 0, clvMisses: 0, history: [] });
                setRoiStats(backup.roiStats || { totalWagered: 0, totalReturn: 0, bets: 0 });

                setPinnedGames(backup.pinnedGames || []);

                if (backup.workerUrl) setWorkerUrl(backup.workerUrl);
                alert('Backup restored! Sport: ' + (backup.sport ? SPORT_CONFIG[backup.sport]?.name || backup.sport : 'default'));
              } catch(err) {
                alert('Error restoring backup: ' + err.message);
              }
            };
            reader.readAsText(file);

                  splitsStatus.includes('cleared') ? 'info' : 'warn'

      )}


      <div className="content">


      {tab === 'scores' && (
        <div className="games-list">
          {games.length > 0 && (
            <div className="dashboard-summary">
              <div className="dashboard-stat">
                <div className="content">
                  <div className="val" style={{color:'var(--gold)'}}>{sharpPlayCount}</div>
                  <div className="lbl">Sharp Plays</div>
                </div>
              </div>
              <div className="dashboard-stat">
                <div className="content">
                  <div className="val" style={{fontSize:'16px'}}>{bestSharpPlay ? bestSharpPlay.awayName.slice(0,3).toUpperCase() : '--'}</div>
                  <div className="lbl">Best: {bestSharpPlay ? Math.max(calcAll(gameData[bestSharpPlay.id]).home?.score ?? 0, calcAll(gameData[bestSharpPlay.id]).away?.score ?? 0) : '--'}</div>
                </div>
              </div>
              <div className="dashboard-stat">
                <div className="content">
                  <div className="val">{sharpRecords.wins}-{sharpRecords.losses}</div>
                  <div className="lbl">Record</div>
                </div>
              </div>
              <div className="dashboard-stat">
                <div className="content">
                  <div className="val" style={{color: (sharpRecords.wins + sharpRecords.losses > 0 && sharpRecords.wins / (sharpRecords.wins + sharpRecords.losses) >= 0.55) ? 'var(--green)' : 'var(--text)'}}>{sharpRecords.wins + sharpRecords.losses > 0 ? Math.round((sharpRecords.wins / (sharpRecords.wins + sharpRecords.losses)) * 100) : 0}%</div>
                  <div className="lbl">Win Rate</div>
                </div>
              </div>
              <div className="dashboard-stat">
                <div className="content">
                  <div className="val" style={{fontSize:'16px'}}>{sharpRecords.clvBeats + sharpRecords.clvMisses > 0 ? Math.round((sharpRecords.clvBeats / (sharpRecords.clvBeats + sharpRecords.clvMisses)) * 100) : 0}%</div>
                  <div className="lbl">CLV Beat</div>
                </div>
              </div>
            </div>
          )}
          <div style={{display:'flex',gap:'16px',justifyContent:'center',padding:'6px 0 10px',fontSize:'10px',color:'var(--text-muted)',fontWeight:600,letterSpacing:'0.3px'}}>
            <span>Wagered <strong style={{color:'var(--accent)',fontFamily:"'JetBrains Mono', monospace",fontSize:'11px'}}>${roiStats.totalWagered}</strong></span>
            <span>Return <strong style={{color: roiStats.totalReturn >= roiStats.totalWagered ? 'var(--green)' : 'var(--red)',fontFamily:"'JetBrains Mono', monospace",fontSize:'11px'}}>${roiStats.totalReturn}</strong></span>
            <span>ROI <strong style={{color: (roiStats.totalReturn - roiStats.totalWagered) >= 0 ? 'var(--green)' : 'var(--red)',fontFamily:"'JetBrains Mono', monospace",fontSize:'11px'}}>{roiStats.totalWagered > 0 ? ((roiStats.totalReturn - roiStats.totalWagered) / roiStats.totalWagered * 100).toFixed(1) : 0}%</strong></span>
          </div>
          <div className="section-header">
            <span className="section-title">Day of Game Splits</span>
            <span className="section-badge">TheSpread.com</span>
          </div>
          {games.length === 0 ? (
            <div className="empty-state">
              <div className="empty-icon">&#127936;</div>
              <div className="empty-title">No games loaded</div>
              <div className="empty-sub">Tap the button above to fetch today's slate</div>
            </div>
          ) : (() => {
            const pinnedSorted = sortedGames.filter(g => pinnedGames.includes(g.id));
            const unpinnedSorted = sortedGames.filter(g => !pinnedGames.includes(g.id));
            return <>
              {pinnedSorted.length > 0 && (
                <>
                  <div className="section-header" style={{marginTop:'8px'}}>
                    <span className="section-title" style={{color:'var(--gold)'}}>{'\u2605'} Favorites ({pinnedSorted.length})</span>
                  </div>
                  {pinnedSorted.map(game => <ErrorBoundary key={game.id}>{renderGameCard(game)}</ErrorBoundary>)}
                  <div className="section-header" style={{marginTop:'16px',marginBottom:'4px'}}>
                    <span className="section-title">All Games</span>
                  </div>
                </>
              )}
              {unpinnedSorted.map(game => <ErrorBoundary key={game.id}>{renderGameCard(game)}</ErrorBoundary>)}
            </>;
          })()}
        </div>
      )}


      {tab === 'all' && (
        <div className="games-list">
          <div className="section-header">
            <span className="section-title">Full Slate</span>
            <span className="section-badge">{games.length} games</span>
          </div>
          {games.map(game => (
            <div className="game-card" key={game.id}>
              <div className="game-header">
                <span>{game.time}</span>
                <div className="line-badges">
                  {game.spread !== null && <span className="line-badge spread">{game.spread > 0 ? '+' : ''}{game.spread}</span>}
                  {game.total !== null && <span className="line-badge total">O/U {game.total}</span>}
                  {game.spread === null && game.total === null && <span style={{fontSize:'11px',color:'var(--text-muted)'}}>No lines</span>}
                </div>
              </div>
              <div className="game-matchup">
                <div className="team-row">
                  <span className="team-name">
                    {game.awayRank && <span className="team-rank">#{game.awayRank}</span>}
                    {game.awayName}
                    <span className="team-record">{game.awayRecord}</span>
                  </span>
                </div>
                <div className="at-symbol">AT</div>
                <div className="team-row">
                  <span className="team-name">
                    {game.homeRank && <span className="team-rank">#{game.homeRank}</span>}
                    {game.homeName}
                    <span className="team-record">{game.homeRecord}</span>
                  </span>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}


      {tab === 'history' && (
        <div className="games-list">
          <div className="section-header">
            <span className="section-title">Bet History</span>
            <span className="section-badge">{record.w}W - {record.l}L - {record.p}P</span>
          </div>
          {history.length === 0 ? (
            <div className="empty-state">
              <div className="empty-icon">&#128202;</div>
              <div className="empty-title">No bets tracked yet</div>
              <div className="empty-sub">Settle your bets on the BetScore tab</div>
            </div>
          ) : [...history].reverse().map((h, i) => (
            <div className="history-item" key={i}>
              <div>
                <div className="history-game">{h.game}</div>
                <div className="history-detail">{h.date} | {h.side} | BS: {h.betScore}</div>
              </div>
              <span className="history-badge" style={{
                background: h.result === 'win' ? 'var(--green-bg)' : h.result === 'loss' ? 'var(--red-bg)' : 'var(--yellow-bg)',
                color: h.result === 'win' ? 'var(--green)' : h.result === 'loss' ? 'var(--red)' : 'var(--yellow)',
              }}>
                {h.result.toUpperCase()}
              </span>
            </div>
          ))}
          {history.length > 0 && (
            <div style={{padding:'20px',textAlign:'center'}}>
              <button onClick={() => { setHistory([]); setBets({}); }}
                style={{padding:'10px 24px',background:'var(--card)',color:'var(--red)',border:'1px solid var(--red-border)',borderRadius:'var(--radius-sm)',fontSize:'12px',fontWeight:700,cursor:'pointer'}}>
                Clear History
              </button>
            </div>
          )}
        </div>
      )}


      </div>


      <div className="summary-bar">
        <div className="summary-stat"><div className="val c-green">{plays}</div><div className="lbl">Plays</div></div>
        <div className="summary-stat"><div className="val c-yellow">{leans}</div><div className="lbl">Leans</div></div>
        <div className="summary-stat"><div className="val" style={{color:'var(--accent)'}}>{record.w}-{record.l}-{record.p}</div><div className="lbl">Record</div></div>
        <div className="summary-stat">
          <div className="val" style={{color: (record.w - record.l) >= 0 ? 'var(--green)' : 'var(--red)'}}>
            {record.w - record.l >= 0 ? '+' : ''}{record.w - record.l}u
          </div>
          <div className="lbl">Units</div>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    }
  ]
};

// Register service worker
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'betscore-v1';
    const ASSETS = ['/'];

    self.addEventListener('install', (e) => {
      e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS)).catch(() => {}));
      self.skipWaiting();
    });

    self.addEventListener('activate', (e) => {
      e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))));
      self.clients.claim();
    });

    self.addEventListener('fetch', (e) => {
      if (e.request.method !== 'GET') return;
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
          if (!resp || resp.status !== 200 || resp.type === 'error') return resp;
          const cache = caches.open(CACHE_NAME);
          cache.then(c => c.put(e.request, resp.clone()));
          return resp;
        }).catch(() => caches.match('/')))
      );
    });
  `;
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
