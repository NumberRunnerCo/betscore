<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Nick's BetScore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111111; --card: #1c1c1e; --card-alt: #161618;
  --border: #2c2c2e; --border-light: #3a3a3c;
  --text: #ffffff; --text-dim: #a0a0a5; --text-muted: #636366;
  --accent: #5ac8fa; --accent-dim: #3a9fd8;
  --green: #34c759; --green-bg: rgba(52,199,89,0.15); --green-border: rgba(52,199,89,0.35);
  --yellow: #ffd60a; --yellow-bg: rgba(255,214,10,0.15); --yellow-border: rgba(255,214,10,0.35);
  --red: #ff453a; --red-bg: rgba(255,69,58,0.15); --red-border: rgba(255,69,58,0.35);
  --gold: #ff9f0a;
  --radius: 12px; --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased;
}
.header {
  background: linear-gradient(180deg, #1a1a1e 0%, var(--bg) 100%);
  padding: 20px 16px 12px; text-align: center;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.header-logo { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.header-logo svg { width: 28px; height: 28px; }
.header h1 {
  font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 0%, var(--gold) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .sub { font-size: 11px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; opacity: 0.7; }
.status-bar { display: flex; justify-content: center; gap: 8px; padding: 8px 16px; flex-wrap: wrap; }
.pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; color: var(--text-dim); background: var(--card); border: 1px solid var(--border); }
.pill .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.settings-toggle { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 10px; background: transparent; color: var(--text-dim); border: none; font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 0.5px; }
.settings-panel { display: none; padding: 0 16px 12px; }
.settings-panel.open { display: block; }
.settings-panel label { font-size: 11px; color: var(--text-dim); display: block; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.settings-panel input { width: 100%; padding: 12px 14px; font-size: 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--card); color: var(--accent); font-family: 'JetBrains Mono', monospace; font-weight: 500; }
.settings-panel input:focus { border-color: var(--accent); outline: none; }
.settings-panel .hint { font-size: 10px; color: var(--text-muted); margin-top: 6px; }
.fetch-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: calc(100% - 32px); margin: 12px auto; padding: 14px;
  background: linear-gradient(135deg, #ff9f0a 0%, #e8850a 100%);
  color: #000; border: none; border-radius: var(--radius);
  font-size: 15px; font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 16px rgba(255,159,10,0.35); transition: all 0.2s;
}
.fetch-btn:active { transform: scale(0.97); }
.fetch-btn:disabled { background: var(--card); color: var(--text-muted); box-shadow: none; }
.fetch-btn.success { background: linear-gradient(135deg, #34c759 0%, #2da44e 100%); box-shadow: 0 4px 12px rgba(52,199,89,0.3); color: #000; }
.export-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: calc(100% - 32px); margin: 8px auto; padding: 12px;
  background: linear-gradient(135deg, #5ac8fa 0%, #3a9fd8 100%);
  color: #000; border: none; border-radius: var(--radius);
  font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(90,200,250,0.25);
}
.export-btn:active { transform: scale(0.97); }
.tabs { display: flex; gap: 4px; padding: 4px 12px; background: transparent; margin-bottom: 4px; }
.tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 600; color: var(--text-dim); border: none; background: transparent; cursor: pointer; border-radius: var(--radius-sm); transition: all 0.2s; }
.tab.active { color: var(--gold); background: var(--card); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
.sort-bar { display: flex; gap: 6px; padding: 4px 12px 8px; align-items: center; }
.sort-label { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-right: 2px; }
.sort-btn { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; color: var(--text-dim); background: transparent; border: 1px solid var(--border); cursor: pointer; }
.sort-btn.active { color: var(--gold); border-color: var(--gold); background: rgba(255,159,10,0.1); }
.games-list { padding: 8px 12px; }
.game-card { background: var(--card); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; border: 1px solid var(--border); }
.game-card.has-score { border-color: var(--border-light); }
.game-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; font-size: 12px; color: var(--text-dim); font-weight: 600; }
.game-header-left { display: flex; align-items: center; gap: 8px; }
.game-refresh { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; font-size: 14px; line-height: 1; }
.game-refresh:active { color: var(--gold); }
.game-matchup { padding: 6px 14px 10px; }
.team-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
.team-name { font-size: 16px; font-weight: 700; color: var(--text); }
.team-rank { font-size: 11px; font-weight: 800; color: var(--gold); margin-right: 5px; }
.team-record { font-size: 11px; color: var(--text-dim); font-weight: 500; margin-left: 6px; }
.live-score { font-size: 20px; font-weight: 800; color: var(--text); margin-left: auto; font-family: 'JetBrains Mono', monospace; }
.at-symbol { font-size: 10px; color: var(--text-muted); padding: 0 14px; font-weight: 600; letter-spacing: 1px; }
.line-badges { display: flex; gap: 8px; }
.line-badge { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 6px; }
.line-badge.spread { background: rgba(255,159,10,0.18); color: var(--gold); border: 1px solid rgba(255,159,10,0.3); }
.line-badge.total { background: rgba(90,200,250,0.15); color: var(--accent); border: 1px solid rgba(90,200,250,0.3); }
.inputs-section { border-top: 1px solid var(--border); background: var(--card-alt); padding: 10px 14px; }
.inputs-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px; }
.inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.inputs-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.input-group label { font-size: 9px; color: var(--text-muted); display: block; margin-bottom: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.input-group input {
  width: 100%; padding: 10px 4px; font-size: 15px; font-weight: 700;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--bg); color: white; text-align: center;
  font-family: 'JetBrains Mono', monospace; -webkit-appearance: none;
}
.input-group input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 3px rgba(255,159,10,0.15); }
.input-group input::placeholder { color: var(--text-muted); font-weight: 500; }
.input-group input.locked { color: var(--text-dim); border-style: dashed; }
.input-group input.current-spread { color: var(--gold); }
.input-group input.current-total { color: var(--accent); }
.diff-box {
  width: 100%; padding: 10px 4px; font-size: 15px; font-weight: 700;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--bg); text-align: center; font-family: 'JetBrains Mono', monospace;
}
.best-line-section { padding: 8px 14px; border-top: 1px solid var(--border); background: var(--card-alt); }
.best-line-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
.best-line-side { font-size: 11px; font-weight: 700; color: var(--text-dim); min-width: 50px; }
.best-line-info { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; }
.best-book { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
.bs-section { border-top: 2px solid var(--gold); background: linear-gradient(135deg, rgba(255,159,10,0.12) 0%, rgba(255,159,10,0.04) 100%); padding: 12px 14px; }
.bs-section-label { font-size: 10px; font-weight: 800; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; text-align: center; }
.bs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.bs-card { background: var(--bg); border-radius: var(--radius-sm); padding: 10px; border: 1px solid var(--border); text-align: center; }
.bs-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.bs-side-label { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
.checks { display: flex; gap: 3px; }
.check { width: 16px; height: 16px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; }
.check.on { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.check.off { background: var(--card); color: var(--text-muted); border: 1px solid var(--border); opacity: 0.3; }
.bs-scores { display: flex; align-items: baseline; justify-content: center; gap: 8px; margin: 4px 0; }
.bs-locked-wrap { text-align: center; }
.bs-locked-label { font-size: 7px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
.bs-locked-num { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--text-dim); }
.bs-live-wrap { text-align: center; }
.bs-live-label { font-size: 7px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); }
.bs-live-num { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 900; text-shadow: 0 0 15px currentColor; }
.verdict-chip { font-size: 11px; font-weight: 800; padding: 4px 12px; border-radius: var(--radius-sm); letter-spacing: 1px; display: inline-block; margin-top: 4px; }
.verdict-max { background: linear-gradient(135deg, #ff9f0a 0%, #e8850a 100%); color: #000; border: 1px solid rgba(255,159,10,0.5); box-shadow: 0 0 12px rgba(255,159,10,0.4); }
.verdict-play { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.verdict-lean { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
.verdict-pass { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.c-green { color: var(--green); } .c-yellow { color: var(--yellow); } .c-red { color: var(--red); }
.section-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; margin-bottom: 8px; }
.section-title { font-size: 14px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
.section-badge { font-size: 10px; padding: 3px 10px; border-radius: 20px; background: var(--card); color: var(--text-dim); font-weight: 600; border: 1px solid var(--border); }
.summary-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: linear-gradient(180deg, rgba(17,17,17,0.95) 0%, var(--bg) 20%);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border-light);
  padding: 12px 20px 12px; display: flex; justify-content: space-around;
}
.summary-stat { text-align: center; }
.summary-stat .val { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 800; }
.summary-stat .lbl { font-size: 9px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.empty-state { text-align: center; padding: 48px 24px; }
.empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.6; }
.empty-title { font-size: 16px; font-weight: 700; color: var(--text-dim); margin-bottom: 6px; }
.empty-sub { font-size: 12px; color: var(--text-muted); }
.history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--card); margin-bottom: 1px; border-radius: var(--radius-sm); }
.history-game { font-size: 13px; font-weight: 600; }
.history-detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.history-badge { font-size: 11px; font-weight: 800; padding: 4px 12px; border-radius: 6px; letter-spacing: 0.5px; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
.status-text { text-align: center; font-size: 11px; color: var(--text-muted); padding: 0 16px 8px; font-weight: 500; }
.content { padding-bottom: 80px; }
.warning-bar { padding: 8px 16px; font-size: 11px; text-align: center; font-weight: 600; background: var(--red-bg); color: var(--red); border-bottom: 1px solid var(--red-border); }
.poly-section { padding: 14px 14px 12px; border-top: 1px solid rgba(139,92,246,0.25); background: linear-gradient(180deg, rgba(139,92,246,0.06) 0%, var(--card-alt) 100%); }
.poly-header { display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
.poly-label { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: #8b5cf6; }
.poly-teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.poly-team { display: flex; align-items: baseline; gap: 6px; }
.poly-team-name { font-size: 13px; font-weight: 700; color: var(--text); }
.poly-team-pct { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 900; }
.poly-track { position: relative; width: 100%; height: 32px; border-radius: 8px; overflow: hidden; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); }
.poly-fill-left { position: absolute; top: 0; left: 0; height: 100%; border-radius: 7px 0 0 7px; transition: width 0.6s ease; }
.poly-fill-right { position: absolute; top: 0; right: 0; height: 100%; border-radius: 0 7px 7px 0; transition: width 0.6s ease; }
.poly-center-mark { position: absolute; top: 0; bottom: 0; left: 50%; width: 1px; background: rgba(255,255,255,0.18); z-index: 2; }
.poly-fill-label { position: absolute; top: 50%; transform: translateY(-50%); font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 900; color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.6); z-index: 3; }
.poly-fill-label.left { left: 10px; }
.poly-fill-label.right { right: 10px; }
.poly-footer { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 8px; }
.poly-vol-badge { font-size: 12px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #a78bfa; background: rgba(139,92,246,0.12); padding: 3px 10px; border-radius: 6px; border: 1px solid rgba(139,92,246,0.2); }
.poly-vol-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
.splits-panel { margin: 8px 16px; border-radius: var(--radius); border: 1px solid rgba(245,158,11,0.25); overflow: hidden; background: var(--card); }
.splits-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; background: linear-gradient(180deg, rgba(245,158,11,0.08) 0%, var(--card) 100%); }
.splits-header-left { display: flex; align-items: center; gap: 8px; }
.splits-header-icon { font-size: 18px; }
.splits-header-title { font-size: 13px; font-weight: 800; color: #f59e0b; letter-spacing: 0.5px; }
.splits-header-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 10px; }
.splits-body { padding: 12px 14px; border-top: 1px solid var(--border); }
.splits-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.splits-btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 8px; border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.splits-btn:active { transform: scale(0.97); }
.splits-btn:disabled { background: var(--card-alt); color: var(--text-muted); box-shadow: none; }
.splits-btn.primary { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #000; box-shadow: 0 2px 8px rgba(245,158,11,0.25); }
.splits-btn.secondary { background: var(--card-alt); color: var(--text-dim); border: 1px solid var(--border); }
.splits-btn.success { background: linear-gradient(135deg, #34c759 0%, #2da44e 100%); color: #000; }
.paste-area { width: 100%; min-height: 100px; padding: 10px; font-size: 11px; line-height: 1.5; font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); border: 1px dashed rgba(245,158,11,0.35); border-radius: var(--radius-sm); resize: vertical; margin-bottom: 8px; }
.paste-area:focus { border-color: #f59e0b; border-style: solid; outline: none; box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }
.paste-area::placeholder { color: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 11px; line-height: 1.6; }
.splits-result { font-size: 11px; text-align: center; padding: 8px 10px; font-weight: 600; border-radius: var(--radius-sm); margin-top: 8px; }
.splits-result.good { color: var(--green); background: var(--green-bg); border: 1px solid var(--green-border); }
.splits-result.warn { color: var(--yellow); background: var(--yellow-bg); border: 1px solid var(--yellow-border); }
.splits-result.bad { color: var(--red); background: var(--red-bg); border: 1px solid var(--red-border); }
.splits-result.info { color: var(--text-dim); background: var(--card-alt); border: 1px solid var(--border); }
.splits-auto-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 6px; border-radius: 3px; background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); margin-left: 6px; }
.splits-debug { margin-top: 8px; padding: 8px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); max-height: 120px; overflow-y: auto; }
.splits-debug-line { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-muted); line-height: 1.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.splits-debug-line.match { color: var(--green); }
.splits-debug-line.err { color: var(--red); }
.splits-debug-line.info { color: var(--accent); }
.splits-source-row { display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 11px; }
.splits-source-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.splits-source-name { font-weight: 700; color: var(--text-dim); min-width: 90px; }
.splits-source-status { font-weight: 600; color: var(--text-muted); font-size: 10px; }
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .summary-bar { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
  .content { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
}
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 4px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.status-final { color: var(--text-muted); font-size: 11px; font-weight: 600; }
.status-live { color: var(--green); font-size: 11px; font-weight: 600; }
.conf-select { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; font-size: 12px; font-family: 'Inter', sans-serif; outline: none; }
.conf-select:focus { border-color: var(--gold); }
.sharp-alert-banner { position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: var(--radius); pointer-events: none; border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(255,159,10,0.4), inset 0 0 20px rgba(255,159,10,0.2); animation: sharpPulse 2s ease-in-out infinite; }

const fetchWithFallback = async (url, timeoutMs) => {
  const tm = timeoutMs || 8000;
  const withTimeout = (promise) => Promise.race([promise, new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), tm))]);
  const methods = [
    () => fetch(url),
    () => fetch('https://corsproxy.io/?' + encodeURIComponent(url)),
    () => fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url)),
    () => fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url)),
  ];
  for (let i = 0; i < methods.length; i++) {
    try { const r = await withTimeout(methods[i]()); if (r.ok) return r; } catch(e) {}
  }
  throw new Error('All fetch methods failed');
};

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, errorInfo) {
    console.error('[ErrorBoundary] Caught error:', error, errorInfo);
  }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ padding: '16px', background: 'rgba(255,69,58,0.1)', border: '1px solid rgba(255,69,58,0.3)', borderRadius: '12px', margin: '8px 12px' }}>
          <div style={{ color: '#ff453a', fontSize: '12px', fontWeight: 700, marginBottom: '6px' }}>Something went wrong with this game card</div>
          <button onClick={() => this.setState({ hasError: false })} style={{ padding: '6px 12px', background: '#ff453a', color: '#fff', border: 'none', borderRadius: '6px', fontSize: '11px', fontWeight: 600, cursor: 'pointer' }}>
            Retry
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

        for (const s of arr) {

          log('  ' + sl + ' | ' + nm + ' | id=' + (s.seriesId || s.series_id || s.id || '?'));

            log(sportCfg.name + ' seriesId: ' + seriesId);

          }

        });
        log('Filtered to ' + events.length + ' game events');
      }
      // C: markets endpoint with game tag
      if (events.length === 0) {
        const mkts = toArr(await pFetch(BASE + '/markets?tag_id=100639&active=true&closed=false&limit=100', 'markets(gameTag)'));
        log('Markets: ' + mkts.length);
        if (mkts.length > 0) {
          mkts.slice(0, 5).forEach((m, i) => log('  [' + i + '] ' + (m.question || m.slug || '?')));
          // Filter for active sport games
          const sportGames = mkts.filter(m => {

          });
          log(sportCfg.name + ' game markets: ' + sportGames.length);
          if (sportGames.length > 0) events = sportGames.map(m => ({ title: m.question || '', markets: [m], slug: m.slug || '' }));
        }

      if (events.length === 0) {

        setPolyStatus('0 games');
        return {};
      }


      setPolyStatus('matching ' + events.length + '...');
      log('Processing ' + events.length + ' game events');


      // Step 3: Parse events into a matchable map

      let parsed = 0;
      for (const ev of events) {
        const mkts = ev.markets || [];

        const liq = parseFloat(mkt.liquidity || mkt.liquidityNum || ev.liquidity || ev.liquidityNum || 0);
        const entry = {
          title: ev.title || ev.question || '',
          outcomes: outcomes.map((o, i) => ({
            name: o,
            price: Math.round((parseFloat(prices[i]) || 0) * 100),
          })),
          liquidity: liq,
          slug: ev.slug || '',
        };
        // Index by outcome names AND by title — use both college-norm and pro-norm
        for (const o of outcomes) {
          const norm = normalize(o, sport);
          const pro = normalizePro(o);
          if (norm.length > 2) polyMap[norm] = entry;
          if (pro.length > 2 && pro !== norm) polyMap[pro] = entry;
          // Also store raw lowercase
          const raw = o.toLowerCase().trim();
          if (raw.length > 2) polyMap['_raw_' + raw] = entry;
          // Last word (mascot name like "Lakers", "Celtics") — great for pro sports
          const lastWord = pro.split(' ').pop();
          if (lastWord && lastWord.length >= 4) polyMap['_last_' + lastWord] = entry;
        }
        const title = (ev.title || ev.question || '').toLowerCase();
        polyMap['_title_' + title] = entry;
        parsed++;
      }
      log('Parsed ' + parsed + ' events into ' + Object.keys(polyMap).length + ' keys');
      log('Sample keys: ' + Object.keys(polyMap).filter(k => !k.startsWith('_')).slice(0,15).join(', '));
      return polyMap;
    } catch(e) {
      log('Error:', e.message);
      setPolyStatus('error: ' + e.message);
      return {};
    }
  };


  // ── Validate splits data quality ──
  const validateSplits = (tickets, money) => {
    const t = parseInt(tickets), m = parseInt(money);
    if (isNaN(t) || isNaN(m)) return { valid: false, confidence: 'none', reason: 'non-numeric' };
    if (t < 10 && m < 10) return { valid: false, confidence: 'none', reason: 'both under 10 - likely record/ranking numbers' };
    if (t > 90 && m > 90) return { valid: false, confidence: 'none', reason: 'both over 90 - likely noise' };
    if (t < 5 || m < 5) return { valid: false, confidence: 'none', reason: 'value under 5% - likely noise' };
    let confidence = 'high';
    let reason = 'ok';
    if (t < 15 || t > 85 || m < 15 || m > 85) { confidence = 'medium'; reason = 'edge values'; }
    if (Math.abs(t - m) > 60) { confidence = 'low'; reason = 'extreme diff (' + Math.abs(t-m) + ')'; }
    return { valid: true, confidence, reason };
  };


  // ── Parse pasted/scraped splits text into game data ──
  const parseSplitsText = (text, gamesList) => {
    const log = (msg) => console.log('[Splits] ' + msg);
    if (!text || text.length < 10) return {};
    log('Parsing text (' + text.length + ' chars). First 500: ' + text.substring(0, 500));
    const lines = text.split(/\n/).map(l => l.trim()).filter(l => l.length > 0);
    log(lines.length + ' lines');


    // Build comprehensive team name lookup with many aliases
    const gameLookup = {}; // key -> { game, side }
    const addLookup = (name, game, side) => {
      const n = name.toLowerCase().trim();
      if (n.length < 2) return;
      if (!gameLookup[n]) gameLookup[n] = { game, side };
      // First word (if 4+ chars): "michigan" from "michigan state"
      const words = n.split(/\s+/);
      if (words[0].length >= 4 && !gameLookup[words[0]]) gameLookup[words[0]] = { game, side };
      // Last word (if 4+ chars): "state" from "michigan state" — skip common words
      const skip = new Set(['state','north','south','east','west','central','northern','southern','western','eastern']);
      const last = words[words.length - 1];
      if (last.length >= 4 && !skip.has(last) && !gameLookup[last]) gameLookup[last] = { game, side };
      // Abbreviation variants
      const abbrevs = {
        'uconn':'connecticut','usc':'southern california','ucla':'ucla','smu':'smu',
        'lsu':'lsu','tcu':'tcu','byu':'byu','unc':'north carolina',
        'osu':'ohio state','msu':'michigan state','uk':'kentucky','ku':'kansas',
        'isu':'iowa state','wvu':'west virginia','pitt':'pittsburgh','cuse':'syracuse',
        'nova':'villanova','cincy':'cincinnati','wisc':'wisconsin','minn':'minnesota',
        'ill':'illinois','ind':'indiana','neb':'nebraska','purdue':'purdue',
        'ark':'arkansas','aub':'auburn','bama':'alabama','miss':'mississippi',
        'vandy':'vanderbilt','tenn':'tennessee','mizz':'missouri','a&m':'texas a&m',
        'okla':'oklahoma','tex':'texas','ut':'texas','colo':'colorado',
        'ore':'oregon','stan':'stanford','cal':'california','zona':'arizona',
        'wash':'washington','creigh':'creighton','marq':'marquette','xav':'xavier',
        'gtown':'georgetown','depaul':'depaul','seton':'seton hall',
        'stj':'st. john\'s','stjohns':'st. john\'s','gonzaga':'gonzaga','zags':'gonzaga',
      };
      for (const [abbr, full] of Object.entries(abbrevs)) {
        if (n.includes(full) || n.includes(abbr)) {
          if (!gameLookup[abbr]) gameLookup[abbr] = { game, side };
          if (!gameLookup[full]) gameLookup[full] = { game, side };
        }
      }
    };
    for (const g of gamesList) {
      addLookup(g.homeName, g, 'home');
      addLookup(g.homeFullName, g, 'home');
      addLookup(g.awayName, g, 'away');
      addLookup(g.awayFullName, g, 'away');
      // Also normalized versions (strip mascots for college)
      addLookup(normalize(g.homeFullName, sport), g, 'home');
      addLookup(normalize(g.awayFullName, sport), g, 'away');
      // Pro-friendly: full lowercased name and last word (mascot)
      addLookup(normalizePro(g.homeFullName), g, 'home');
      addLookup(normalizePro(g.awayFullName), g, 'away');
      const hLast = normalizePro(g.homeFullName).split(' ').pop();
      const aLast = normalizePro(g.awayFullName).split(' ').pop();
      if (hLast && hLast.length >= 4) addLookup(hLast, g, 'home');
      if (aLast && aLast.length >= 4) addLookup(aLast, g, 'away');
    }
    log('Lookup has ' + Object.keys(gameLookup).length + ' keys. Sample: ' + Object.keys(gameLookup).slice(0, 20).join(', '));


    // Flexible team matching
    const findTeam = (rawName) => {
      const name = rawName.toLowerCase().replace(/[#\d()@]/g, '').replace(/\s+/g, ' ').trim();
      if (name.length < 2) return null;
      // Exact match first
      if (gameLookup[name]) return gameLookup[name];
      // Check if name contains or is contained by any lookup key
      for (const [key, val] of Object.entries(gameLookup)) {
        if (key.length < 3) continue;
        if (name.includes(key) || key.includes(name)) return val;
      }
      // Try each word individually (4+ chars)
      const words = name.split(/\s+/);
      for (const w of words) {
        if (w.length >= 4 && gameLookup[w]) return gameLookup[w];
      }
      return null;
    };


    const results = {};
    const foundForGame = new Set(); // track game IDs we already matched


    // Strategy 1: Lines with team name + 2+ numbers (most common format)
    // Handles: "Duke 55 62", "Duke 55% 62%", "Duke  55  62  -3.5", "Duke | 55 | 62"
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      // Extract percentage-like numbers (skip spreads/decimals like -3.5)
      const allNums = [];
      const numRegex = /(?:^|[^.\d-])(\d{1,3})(%|\s|$|\t|\|)/g;
      let nm;
      while ((nm = numRegex.exec(line)) !== null) {
        const n = parseInt(nm[1]);
        if (n >= 1 && n <= 100) allNums.push({ val: n, idx: nm.index + (nm[0].length - nm[1].length - nm[2].length) });
      }
      if (allNums.length < 2) continue;


      // Extract team name: text before the first number
      const firstNumIdx = allNums[0].idx;
      const teamPart = line.substring(0, firstNumIdx).replace(/[|,\t:]+$/, '').trim();
      if (teamPart.length < 2) continue;


      const match = findTeam(teamPart);
      if (match && !foundForGame.has(match.game.id)) {
        const tickets = allNums[0].val;
        const money = allNums.length >= 2 ? allNums[1].val : null;
        if (money !== null) {
          const v = validateSplits(tickets, money);
          if (v.valid) {
            results[match.game.id] = { tickets, money, side: match.side, source: 'parsed', confidence: v.confidence };
            foundForGame.add(match.game.id);
            log('Match: "' + teamPart + '" -> ' + match.game.homeName + ' vs ' + match.game.awayName + ' (' + match.side + ') T:' + tickets + ' M:' + money + ' [' + v.confidence + ']');
          } else {
            log('Rejected: "' + teamPart + '" T:' + tickets + ' M:' + money + ' (' + v.reason + ')');
          }
        }
      }
    }


    // Strategy 2: Team name on one line, numbers on the next (or nearby)
    if (Object.keys(results).length < gamesList.length) {
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        // Skip lines that are mostly numbers
        if (/^\d/.test(line)) continue;
        const teamPart = line.replace(/[|,\t:]+/g, ' ').trim();
        const match = findTeam(teamPart);
        if (!match || foundForGame.has(match.game.id)) continue;


        // Look at next 1-3 lines for numbers
        for (let j = 1; j <= 3 && i + j < lines.length; j++) {
          const nextLine = lines[i + j];
          const nums = [];
          const numRegex2 = /(?:^|[^.\d-])(\d{1,3})(%|\s|$|\t|\|)/g;
          let nm2;
          while ((nm2 = numRegex2.exec(nextLine)) !== null) {
            const n = parseInt(nm2[1]);
            if (n >= 0 && n <= 100) nums.push(n);
          }
          if (nums.length >= 2) {
            const v = validateSplits(nums[0], nums[1]);
            if (v.valid) {
              results[match.game.id] = { tickets: nums[0], money: nums[1], side: match.side, source: 'parsed', confidence: v.confidence };
              foundForGame.add(match.game.id);
              log('Match (multiline): "' + teamPart + '" -> ' + match.game.homeName + ' T:' + nums[0] + ' M:' + nums[1] + ' [' + v.confidence + ']');
              break;
            } else {
              log('Rejected (multiline): "' + teamPart + '" T:' + nums[0] + ' M:' + nums[1] + ' (' + v.reason + ')');
            }
          }
        }
      }
    }


    // Strategy 3: Look for "Team1 vs Team2" on one line, then percentages nearby
    if (Object.keys(results).length < gamesList.length) {
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].toLowerCase();
        const vsMatch = line.match(/(.+?)\s+(?:vs\.?|@|at)\s+(.+)/i);
        if (!vsMatch) continue;
        const team1 = findTeam(vsMatch[1]);
        const team2 = findTeam(vsMatch[2]);
        if (!team1 || foundForGame.has(team1.game.id)) continue;
        // Look for numbers in surrounding lines
        for (let j = 1; j <= 4 && i + j < lines.length; j++) {
          const nextLine = lines[i + j];
          const nums = [];
          const numRegex3 = /(?:^|[^.\d-])(\d{1,3})(%|\s|$|\t|\|)/g;
          let nm3;
          while ((nm3 = numRegex3.exec(nextLine)) !== null) {
            const n = parseInt(nm3[1]);
            if (n >= 0 && n <= 100) nums.push(n);
          }
          if (nums.length >= 2) {
            const v = validateSplits(nums[0], nums[1]);
            if (v.valid) {
              results[team1.game.id] = { tickets: nums[0], money: nums[1], side: team1.side, source: 'parsed', confidence: v.confidence };
              foundForGame.add(team1.game.id);
              log('Match (vs): "' + vsMatch[1].trim() + ' vs ' + vsMatch[2].trim() + '" T:' + nums[0] + ' M:' + nums[1] + ' [' + v.confidence + ']');
              break;
            } else {
              log('Rejected (vs): T:' + nums[0] + ' M:' + nums[1] + ' (' + v.reason + ')');
            }
          }
        }
      }
    }


    log('Total matched: ' + Object.keys(results).length + '/' + gamesList.length);
    if (Object.keys(results).length === 0) {
      // Debug: show first 20 lines to help diagnose
      log('No matches. First 20 lines:');
      lines.slice(0, 20).forEach((l, i) => log('  [' + i + '] ' + l.substring(0, 120)));
    }
    return results;
  };


  // ── Auto-fetch betting splits from public sources ──
  // ── Fetch HTML through CORS proxies ──
  const fetchHtml = async (url) => {
    const proxies = [
      (u) => u,
      (u) => 'https://corsproxy.io/?' + encodeURIComponent(u),
      (u) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
      (u) => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
    ];
    for (let i = 0; i < proxies.length; i++) {
      try {
        const r = await Promise.race([
          fetch(proxies[i](url)),
          new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000))
        ]);
        if (r.ok) {
          const text = await r.text();
          if (text && text.length > 200) return text;
        }
      } catch(e) {}
    }
    throw new Error('all proxies failed');
  };


  // ── Parse HTML page for splits data ──
  const parseHtmlForSplits = (html, gamesList, slog) => {
    try {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      slog('Page: ' + (doc.title || '(no title)'), 'info');


      // 1. Check for embedded JSON
      const scripts = doc.querySelectorAll('script');
      for (const s of scripts) {
        const t = s.textContent || '';
        const patterns = [
          /__NEXT_DATA__\s*=\s*({[\s\S]+?})\s*;?\s*$/m,
          /window\.__data\s*=\s*({[\s\S]+?})\s*;?\s*$/m,
        ];
        for (const re of patterns) {
          const m = t.match(re);
          if (m) {
            try {
              const j = JSON.parse(m[1]);
              slog('Found embedded JSON', 'info');
              const search = (obj, d) => {
                if (d > 8 || !obj) return [];
                let f = [];
                if (Array.isArray(obj) && obj.length > 0 && typeof obj[0] === 'object') {
                  const ks = Object.keys(obj[0]).join(' ').toLowerCase();
                  if (/ticket|money|handle|bets|consensus|pct/.test(ks)) f.push(obj);
                }
                if (typeof obj === 'object') {
                  for (const v of Object.values(obj)) f = f.concat(search(v, d + 1));
                }
                return f;
              };
              const arrs = search(j, 0);
              for (const arr of arrs) {
                const txt = arr.map(item => Object.values(item).filter(v => typeof v === 'string' || typeof v === 'number').join('\t')).join('\n');
                const r = parseSplitsText(txt, gamesList);
                if (Object.keys(r).length > 0) return r;
              }
            } catch(e) {}
          }
        }
      }


      // 2. Try table rows
      const rows = doc.querySelectorAll('tr');
      if (rows.length > 2) {
        slog(rows.length + ' table rows found', 'info');
        let tableText = '';
        rows.forEach(r => {
          const cells = Array.from(r.querySelectorAll('td, th')).map(c => (c.innerText || c.textContent || '').trim());
          tableText += cells.join('\t') + '\n';
        });
        const r = parseSplitsText(tableText, gamesList);
        if (Object.keys(r).length > 0) return r;
      }


      // 3. Try consensus/matchup divs
      const divs = doc.querySelectorAll('[class*="consensus"], [class*="picks"], [class*="split"], [class*="matchup"], [class*="game"], [class*="event"], [class*="row"]');
      if (divs.length > 0) {
        slog(divs.length + ' matchup elements', 'info');
        let divText = '';
        divs.forEach(d => { divText += (d.innerText || d.textContent || '').trim() + '\n'; });
        const r = parseSplitsText(divText, gamesList);
        if (Object.keys(r).length > 0) return r;
      }


      // 4. Full body text
      const bodyText = doc.body ? (doc.body.innerText || doc.body.textContent || '') : '';
      slog('Body: ' + bodyText.length + ' chars', 'info');
      if (bodyText.length > 50) return parseSplitsText(bodyText, gamesList);
    } catch(e) { slog('Parse error: ' + e.message, 'err'); }
    return {};
  };


  // ── Auto-fetch betting splits from public sources ──
  const fetchBettingSplits = async (gamesList, isManual) => {
    const slog = (msg, type) => { addSplitsLog(msg, type); console.log('[Splits] ' + msg); };

    const cfg = SPORT_CONFIG[sport];

    if (sources.length === 0) {

      return {};

    const srcStatus = {};

          setSplitsSourceStatus({...srcStatus});
          for (const [id, val] of Object.entries(data)) {

  // ML to implied probability conversion
  const mlToProb = (ml) => {
    if (ml == null) return null;
    return ml < 0 ? Math.abs(ml) / (Math.abs(ml) + 100) : 100 / (ml + 100);
  };
  // Convert ML probability movement to pseudo-spread value for BetScore
  const probToSpreadEquiv = (probDelta) => probDelta * 30; // 3% shift ≈ 0.9 spread pts


  // ── Apply splits data to game inputs ──
  const applySplitsToGames = (splitsData, overwrite) => {
    if (!splitsData || Object.keys(splitsData).length === 0) return 0;
    let filled = 0;
    setGameData(prev => {
      const next = { ...prev };
      for (const [gameId, splits] of Object.entries(splitsData)) {
        if (next[gameId]) {
          const gd = next[gameId];
          // Don't update splits for locked (live/final) games — BetScore should be frozen
          if (gd._closingLocked) continue;
          if (overwrite || gd.tickets === '' || gd.tickets == null) {
            var finalT = splits.side === 'home' ? parseInt(splits.tickets) : 100 - parseInt(splits.tickets);
            var finalM = splits.side === 'home' ? parseInt(splits.money) : 100 - parseInt(splits.money);
            var isBad = isNaN(finalT) || isNaN(finalM) || (finalT < 10 && finalM < 10) || finalT < 5 || finalM < 5 || (finalT > 95 && finalM > 95);
            if (isBad) {
              console.log('[Splits] BLOCKED: game ' + gameId + ' T=' + finalT + ' M=' + finalM);
            } else {
              gd.tickets = String(finalT);
              gd.money = String(finalM);
              gd._splitsSource = splits.source || 'auto';
              var conf = splits.confidence || 'unknown';
              if (finalT < 15 || finalT > 85 || finalM < 15 || finalM > 85) conf = 'medium';
              if (Math.abs(finalT - finalM) > 60) conf = 'low';
              gd._splitsConfidence = conf;
              filled++;
              // Calculate RLM: line moved toward team but public money is opposite
              let homeLineMove;
              if (gd.isMlPrimary && gd.openHomeProb != null && gd.homeProb != null) {
                homeLineMove = probToSpreadEquiv(gd.homeProb - gd.openHomeProb);
              } else {
                homeLineMove = (parseFloat(gd.homeOpenLine) || 0) - (parseFloat(gd.homeCurrentLine) || 0);
              }
              const ticketsPct = parseFloat(finalT) || 0;
              if (homeLineMove > 0 && ticketsPct > 50) {
                gd.rlmSide = 'away';
              } else if (homeLineMove < 0 && ticketsPct < 50) {
                gd.rlmSide = 'home';
              } else {
                gd.rlmSide = null;
              }
            }
          }
        }
      }
      return next;
    });
    return filled;
  };

  const fetchGames = useCallback(async (force) => {

  const calcSide = (tickets, money, lineMove) => {
    if (tickets === '' || money === '' || tickets == null || money == null) return null;
    const t = parseFloat(tickets) || 0;
    const m = parseFloat(money) || 0;
    const diff = m - t;
    const score = Math.round(diff + (lineMove * 10) + (100 - m));
    return { score, lineMove, diff };
  };


  // ── All 4 BetScores for a game ──
  const calcAll = (gd) => {
    if (!gd) return { home: null, away: null, over: null, under: null };

    let homeMove, awayMove;
    if (gd.isMlPrimary && gd.openHomeProb != null && gd.homeProb != null) {
      // ML sports: convert probability movement to pseudo-spread equivalent
      // A 3% probability shift ≈ 0.9 spread points (probToSpreadEquiv)
      // When game is locked, use closing probability (not live which keeps changing)
      const homeClosingProb = gd._closingLocked ? (gd.closingHomeProb != null ? gd.closingHomeProb : gd.homeProb) : gd.homeProb;
      const awayClosingProb = gd._closingLocked ? (gd.closingAwayProb != null ? gd.closingAwayProb : gd.awayProb) : gd.awayProb;
      const homeProbDelta = (homeClosingProb || 0) - (gd.openHomeProb || 0);
      const awayProbDelta = (awayClosingProb || 0) - (gd.openAwayProb || 0);
      homeMove = probToSpreadEquiv(homeProbDelta);
      awayMove = probToSpreadEquiv(awayProbDelta);
    } else {
      // Spread sports: lineMove = open - effective (use closing line if locked, otherwise current)
      const homeEffective = gd._closingLocked ? (gd.homeClosingLine != null ? gd.homeClosingLine : gd.homeCurrentLine) : gd.homeCurrentLine;
      homeMove = (parseFloat(gd.homeOpenLine) || 0) - (parseFloat(homeEffective) || 0);
      const awayEffective = gd._closingLocked ? (gd.awayClosingLine != null ? gd.awayClosingLine : gd.awayCurrentLine) : gd.awayCurrentLine;
      awayMove = (parseFloat(gd.awayOpenLine) || 0) - (parseFloat(awayEffective) || 0);
    }

    const home = calcSide(gd.tickets, gd.money, homeMove);
    const awayTickets = gd.tickets !== '' ? String(100 - (parseFloat(gd.tickets)||0)) : '';
    const awayMoney = gd.money !== '' ? String(100 - (parseFloat(gd.money)||0)) : '';
    const away = calcSide(awayTickets, awayMoney, awayMove);
    // Totals: lineMove = effective - open (going up = good for over, use closing line if locked)
    const totalEffective = gd._closingLocked ? (gd.closingTotal != null ? gd.closingTotal : gd.currentTotal) : gd.currentTotal;
    const overMove = (parseFloat(totalEffective) || 0) - (parseFloat(gd.openTotal) || 0);
    const over = calcSide(gd.totalTickets, gd.totalMoney, overMove);
    const underTickets = gd.totalTickets !== '' && gd.totalTickets != null ? String(100 - (parseFloat(gd.totalTickets)||0)) : '';
    const underMoney = gd.totalMoney !== '' && gd.totalMoney != null ? String(100 - (parseFloat(gd.totalMoney)||0)) : '';
    const under = calcSide(underTickets, underMoney, -overMove);
    return { home, away, over, under };
  };


  // ── 3 checkmarks per Nick's system ──
  // 1. Money% exceeds Tickets% by >14 on this team (sharp money signal)
  // 2. Line moved toward this team (lineMove > 0 = books adjusting for action)
  // 3. This team has less than 50% of total money (contrarian value)
  const getChecks = (bs, money) => {
    if (!bs) return [false, false, false];
    const m = parseFloat(money) || 0;
    return [
      bs.diff > 14,
      bs.lineMove > 0,
      m < 50,
    ];
  };


  // ── Best line across all books (best number, then best juice as tiebreak) ──
  const getBestLine = (books, side) => {
    if (!books || books.length === 0) return null;
    let best = null;
    for (const b of books) {
      let spread, juice;
      if (side === 'home') { spread = b.homeSpread; juice = b.homeJuice; }
      else if (side === 'away') { spread = b.awaySpread; juice = b.awayJuice; }
      else continue;
      if (spread == null) continue;
      if (!best || spread > best.spread || (spread === best.spread && (juice||0) > (best.juice||0))) {
        best = { book: b.name, spread, juice: juice || 0 };
      }
    }
    return best;
  };


  const togglePin = (gameId) => {
    setPinnedGames(prev => prev.includes(gameId) ? prev.filter(id => id !== gameId) : [...prev, gameId]);
  };


  const updateGameData = (id, field, value) => {
    setGameData(prev => {
      const next = { ...prev, [id]: { ...prev[id], [field]: value } };
      const gd = next[id];
      // Auto-lock: if spread splits just became complete and not yet locked
      if (gd.tickets !== '' && gd.money !== '' && gd.lockedHomeBS == null) {
        const all = calcAll(gd);
        if (all.home) gd.lockedHomeBS = all.home.score;
        if (all.away) gd.lockedAwayBS = all.away.score;
      }
      // Auto-lock totals
      if (gd.totalTickets !== '' && gd.totalMoney !== '' && gd.lockedOverBS == null) {
        const all = calcAll(gd);
        if (all.over) gd.lockedOverBS = all.over.score;
        if (all.under) gd.lockedUnderBS = all.under.score;
      }
      return next;
    });
  };


  const scoreColor = (s) => s >= 70 ? 'c-green' : s >= 50 ? 'c-yellow' : 'c-red';
  const verdict = (s) => s >= 90 ? { t: 'MAX PLAY', c: 'verdict-max' } : s >= 70 ? { t: 'PLAY', c: 'verdict-play' } : s >= 50 ? { t: 'LEAN', c: 'verdict-lean' } : { t: 'PASS', c: 'verdict-pass' };


  const conferences = ['all', ...new Set(games.map(g => g.conference).filter(c => c && c.length > 0))].sort((a, b) => a === 'all' ? -1 : b === 'all' ? 1 : a.localeCompare(b));


  const countSharpChecks = (gameId) => {
    const gd = gameData[gameId] || {};
    const all = calcAll(gd);
    const hc = getChecks(all.home, gd.money);
    const ac = getChecks(all.away, gd.money !== '' ? String(100-(parseFloat(gd.money)||0)) : '');
    return (hc.filter(Boolean).length === 3) || (ac.filter(Boolean).length === 3);
  };


  const filteredGames = (() => {
    var conf = confFilter === 'all' ? [...games] : games.filter(g => g.conference === confFilter);
    if (sharpOnlyFilter) {
      conf = conf.filter(g => countSharpChecks(g.id));
    }
    return conf;
  })();


  const sharpPlayCount = games.filter(g => countSharpChecks(g.id)).length;
  const bestSharpPlay = (() => {
    var best = null;
    var bestScore = -999;
    for (const g of games) {
      if (!countSharpChecks(g.id)) continue;
      const gd = gameData[g.id] || {};
      const all = calcAll(gd);
      const maxScore = Math.max(all.home?.score ?? -999, all.away?.score ?? -999);
      if (maxScore > bestScore) { bestScore = maxScore; best = g; }
    }
    return best;
  })();


  const sortedGames = [...filteredGames].sort((a, b) => {
    // Status grouping: live ('in') first, then upcoming ('pre'), then finished ('post')
    const statusOrder = (status) => {
      if (status === 'in') return 0;
      if (status === 'pre') return 1;
      if (status === 'post') return 2;
      return 3;
    };
    const aStatusOrder = statusOrder(a.gameStatus);
    const bStatusOrder = statusOrder(b.gameStatus);
    if (aStatusOrder !== bStatusOrder) return aStatusOrder - bStatusOrder;


    // Within same status group, apply secondary sort
    if (sortBy === 'betscore') {
      const aAll = calcAll(gameData[a.id]);
      const bAll = calcAll(gameData[b.id]);
      const aMax = Math.max(aAll.home?.score ?? -999, aAll.away?.score ?? -999);
      const bMax = Math.max(bAll.home?.score ?? -999, bAll.away?.score ?? -999);
      return bMax - aMax;
    }
    if (sortBy === 'checks') {
      const countChecks = (id) => {
        const gd = gameData[id] || {};
        const all = calcAll(gd);
        const hc = getChecks(all.home, gd.money);
        const ac = getChecks(all.away, gd.money !== '' ? String(100-(parseFloat(gd.money)||0)) : '');
        return hc.filter(Boolean).length + ac.filter(Boolean).length;
      };
      return countChecks(b.id) - countChecks(a.id);
    }
    if (sortBy === 'time') {
      const timeToMinutes = (timeStr) => {
        const match = timeStr.match(/(\d+):(\d+)\s*(AM|PM)?/i);
        if (!match) return 0;
        let h = parseInt(match[1]);
        const m = parseInt(match[2]);
        const period = match[3] ? match[3].toUpperCase() : 'AM';
        if (period === 'PM' && h !== 12) h += 12;
        if (period === 'AM' && h === 12) h = 0;
        return h * 60 + m;
      };
      return timeToMinutes(a.time) - timeToMinutes(b.time);
    }
    return 0;
  });


  const plays = games.filter(g => {
    const all = calcAll(gameData[g.id]);
    return (all.home && all.home.score >= 70) || (all.away && all.away.score >= 70);
  }).length;
  const leans = games.filter(g => {
    const all = calcAll(gameData[g.id]);
    const hs = all.home?.score; const as = all.away?.score;
    return ((hs && hs >= 50 && hs < 70) || (as && as >= 50 && as < 70)) && !(hs >= 70 || as >= 70);
  }).length;
  const record = Object.values(bets).reduce((acc, b) => {
    if (b.result === 'win') acc.w++;
    if (b.result === 'loss') acc.l++;
    if (b.result === 'push') acc.p++;
    return acc;
  }, { w: 0, l: 0, p: 0 });


  // ── Export ──
  const exportToExcel = () => {
    if (!window.XLSX) { alert('SheetJS not loaded yet.'); return; }
    const wb = XLSX.utils.book_new();
    const today = new Date();
    const ds = (today.getMonth()+1)+'/'+today.getDate()+'/'+(today.getFullYear()%100);
    const rows = [];
    rows.push(['','Day of Game Splits','','Spread','','','','Line','','Bet','','','','Total']);
    rows.push(['Day/Time','Games','','','Tickets','Money','Diff','Movement','','Home BS','Away BS','Over BS','Under BS','Line']);
    for (const game of games) {
      const gd = gameData[game.id] || {};
      const all = calcAll(gd);
      const t = gd.tickets !== '' ? parseFloat(gd.tickets) : '';
      const m = gd.money !== '' ? parseFloat(gd.money) : '';
      const cl = gd.homeCurrentLine != null ? parseFloat(gd.homeCurrentLine) :
                 (gd.isMlPrimary && gd.homeML != null ? 'ML ' + (gd.homeML > 0 ? '+' : '') + gd.homeML + '/' + (gd.awayML > 0 ? '+' : '') + gd.awayML : '');
      const ct = gd.currentTotal != null ? parseFloat(gd.currentTotal) : '';
      rows.push([
        ds+' '+game.time,
        game.awayName+'('+game.awayRecord+') vs '+game.homeName+'('+game.homeRecord+')',
        '', cl, t !== '' ? t : 100, m !== '' ? m : 100,
        all.home ? all.home.diff : 0, all.home ? all.home.lineMove : 0, '',
        all.home ? all.home.score : 0, all.away ? all.away.score : 0,
        all.over ? all.over.score : 0, all.under ? all.under.score : 0, ct
      ]);
    }
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:12},{wch:38},{wch:4},{wch:8},{wch:8},{wch:8},{wch:8},{wch:10},{wch:4},{wch:10},{wch:10},{wch:10},{wch:10},{wch:8}];
    XLSX.utils.book_append_sheet(wb, ws, 'BetScore');
    XLSX.writeFile(wb, 'BetScore_'+ds.replace(/\//g,'-')+'.xlsx');
  };


  const placeBet = (gameId, side) => { setBets(prev => ({...prev, [gameId]: { side, result: null }})); };
  const settleBet = (gameId, result) => {
    setBets(prev => { const bet = prev[gameId]; if(!bet) return prev; return {...prev, [gameId]: {...bet, result}}; });
    const game = games.find(g => g.id === gameId);
    if (game) {
      const gd = gameData[gameId]; const all = calcAll(gd);
      const bestScore = Math.max(all.home?.score ?? 0, all.away?.score ?? 0);
      setHistory(prev => [...prev, { date: new Date().toLocaleDateString(), game: game.awayName+' @ '+game.homeName, side: bets[gameId]?.side || '?', betScore: bestScore, result }]);


      // Track sharp plays
      if (countSharpChecks(gameId) && game.gameStatus === 'post') {
        var didWin = false;
        const hc = getChecks(all.home, gd.money);
        const ac = getChecks(all.away, gd.money !== '' ? String(100-(parseFloat(gd.money)||0)) : '');
        const sharpHome = hc.filter(Boolean).length === 3;
        const sharpAway = ac.filter(Boolean).length === 3;


        if (sharpHome || sharpAway) {
          const spread = parseFloat(gd.homeCurrentLine) || 0;
          const homeFinal = parseInt(game.homeScore) || 0;
          const awayFinal = parseInt(game.awayScore) || 0;
          const homeMargin = homeFinal - awayFinal;


          if (sharpHome) didWin = homeMargin > spread;
          else if (sharpAway) didWin = -homeMargin > spread;


          setSharpRecords(prev => ({
            ...prev,
            wins: prev.wins + (didWin ? 1 : 0),
            losses: prev.losses + (didWin ? 0 : 1),
            history: [...prev.history, { gameId, game: game.awayName+' @ '+game.homeName, date: new Date().toLocaleDateString(), sharp: sharpHome ? game.homeName : game.awayName, result: didWin ? 'win' : 'loss' }]
          }));
        }
      }
    }
  };


  // ── Get color class for BetScore gradient ──
  const getScoreClass = (s) => {
    if (s >= 120) return 'score-120plus';
    if (s >= 80) return 'score-80-119';
    if (s >= 40) return 'score-40-79';
    if (s >= 0) return 'score-0-39';
    if (s > -40) return 'score-neg1-neg39';
    if (s > -80) return 'score-neg40-neg79';
    return 'score-neg80plus';
  };


  // ── SparklineChart Component with Tooltip Support ──
  const SparklineChart = ({ lineHistory, openLine, color, dataKey }) => {
    const [hoverIdx, setHoverIdx] = useState(null);
    const isProb = dataKey === 'homeProb' || dataKey === 'awayProb';
    const fmtVal = (v) => isProb ? Math.round(v * 100) + '%' : (v > 0 ? '+' : '') + (Number.isInteger(v) ? v : v.toFixed(1));
    if (!lineHistory || lineHistory.length < 1) return null;
    const width = 300, height = 80, padL = 8, padR = 40, padT = 10, padB = 14;
    const inner = { x: padL, y: padT, w: width - padL - padR, h: height - padT - padB };
    const openVal = openLine != null ? parseFloat(openLine) : null;
    const filtered = openVal != null ? lineHistory.filter(e => !(e[dataKey] === 0 && openVal !== 0)) : lineHistory;
    // Remove entries where the dataKey is missing/undefined (e.g., old entries without total)
    const withData = filtered.filter(e => e[dataKey] != null);
    const history = withData.length > 0 ? withData : filtered.filter(e => e[dataKey] != null);
    if (history.length < 1) return null;
    const values = history.map(e => e[dataKey]);
    const goldColor = color || '#ff9f0a';
    const lineColor = color === '#5ac8fa' ? '#3a9fd8' : '#e8920a';
    const textMutedColor = '#a0a0a5';
    const uid = 'spark_' + Math.random().toString(36).substr(2, 9);
    const firstVal = values[0], lastVal = values[values.length - 1];

    if (lineHistory.length === 1) {
      return (
        <div style={{textAlign:'center', padding:'4px 0'}}>
          <svg width={width} height={height} viewBox={'0 0 ' + width + ' ' + height} style={{borderRadius: '8px', overflow: 'visible'}}>
            <rect x="0" y="0" width={width} height={height} rx="8" fill="rgba(30,30,34,0.9)" />
            <line x1={padL} y1={height/2} x2={width - padR} y2={height/2} stroke="rgba(255,255,255,0.12)" strokeWidth="1" strokeDasharray="4,3" />
            <circle cx={(padL + width - padR) / 2} cy={height/2} r="4" fill={goldColor} />
            <text x={(padL + width - padR) / 2} y={height/2 - 12} fontSize="11" fill={textMutedColor} fontFamily="'JetBrains Mono', monospace" textAnchor="middle">{firstVal > 0 ? '+' : ''}{firstVal}</text>
            <text x={(padL + width - padR) / 2} y={height - 4} fontSize="9" fill="rgba(160,160,165,0.4)" fontFamily="'Inter', sans-serif" textAnchor="middle">Refresh to build chart</text>
          </svg>
        </div>
      );
    }

    const baselineVal = openVal != null ? openVal : firstVal;
    const rawMin = Math.min(...values);
    const rawMax = Math.max(...values);
    const min = Math.min(rawMin, baselineVal);
    const max = Math.max(rawMax, baselineVal);
    const range = max - min || 1;
    const isFlat = rawMin === rawMax;
    const baselineY = isFlat ? (inner.y + inner.h / 2) : (inner.y + inner.h - ((baselineVal - min) / range) * inner.h);
    const points = history.map((e, i) => {
      const x = inner.x + (i / (history.length - 1)) * inner.w;
      const y = isFlat ? (inner.y + inner.h / 2) : (inner.y + inner.h - ((e[dataKey] - min) / range) * inner.h);
      return [x, y];
    });
    const pathStr = points.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
    const areaPath = pathStr + 'L' + points[points.length-1][0].toFixed(1) + ',' + baselineY.toFixed(1) + 'L' + inner.x + ',' + baselineY.toFixed(1) + 'Z';

    const yTicks = [];
    if (!isFlat) {
      const step = range / 3;
      for (let i = 0; i <= 3; i++) {
        const val = max - i * step;
        const y = inner.y + (i / 3) * inner.h;
        yTicks.push({ val, y });
      }
    }

    const moved = lastVal - firstVal;
    const endDotColor = moved > 0 ? '#34c759' : moved < 0 ? '#ff453a' : goldColor;

    const hoverPoint = hoverIdx != null && points[hoverIdx] ? { x: points[hoverIdx][0], y: points[hoverIdx][1], value: values[hoverIdx], time: history[hoverIdx].time } : null;
    const hoverTime = hoverPoint ? new Date(hoverPoint.time).toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'}) : '';

    return (
      <div style={{textAlign:'center', padding:'4px 0'}}>
        <svg width={width} height={height} viewBox={'0 0 ' + width + ' ' + height} style={{borderRadius: '8px', overflow: 'visible'}} onMouseMove={(e) => {
          const rect = e.currentTarget.getBoundingClientRect();
          const x = e.clientX - rect.left;
          let closest = 0;
          let closestDist = Math.abs(points[0][0] - x);
          for (let i = 1; i < points.length; i++) {
            const dist = Math.abs(points[i][0] - x);
            if (dist < closestDist) {
              closestDist = dist;
              closest = i;
            }
          }
          if (closestDist < 20) setHoverIdx(closest);
        }} onMouseLeave={() => setHoverIdx(null)}>
          <defs>
            <linearGradient id={uid + '_above'} x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor={color === '#5ac8fa' ? 'rgba(90,200,250,0.45)' : 'rgba(255,159,10,0.45)'} />
              <stop offset="100%" stopColor={color === '#5ac8fa' ? 'rgba(90,200,250,0.03)' : 'rgba(255,159,10,0.03)'} />
            </linearGradient>
            <linearGradient id={uid + '_below'} x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor={color === '#5ac8fa' ? 'rgba(90,200,250,0.03)' : 'rgba(255,159,10,0.03)'} />
              <stop offset="100%" stopColor={color === '#5ac8fa' ? 'rgba(90,200,250,0.35)' : 'rgba(255,159,10,0.35)'} />
            </linearGradient>
            <clipPath id={uid + '_clipAbove'}>
              <rect x="0" y="0" width={width} height={baselineY.toFixed(1)} />
            </clipPath>
            <clipPath id={uid + '_clipBelow'}>
              <rect x="0" y={baselineY.toFixed(1)} width={width} height={height - baselineY} />
            </clipPath>
          </defs>
          <rect x="0" y="0" width={width} height={height} rx="8" fill="rgba(25,25,30,0.95)" />
          {yTicks.map((t, i) => <line key={i} x1={inner.x} y1={t.y.toFixed(1)} x2={inner.x + inner.w} y2={t.y.toFixed(1)} stroke="rgba(255,255,255,0.04)" strokeWidth="1" />)}
          <line x1={inner.x} y1={baselineY.toFixed(1)} x2={inner.x + inner.w} y2={baselineY.toFixed(1)} stroke="rgba(255,255,255,0.18)" strokeWidth="1" strokeDasharray="5,4" />
          {!isFlat && <path d={areaPath} fill={'url(#' + uid + '_above)'} clipPath={'url(#' + uid + '_clipAbove)'} />}
          {!isFlat && <path d={areaPath} fill={'url(#' + uid + '_below)'} clipPath={'url(#' + uid + '_clipBelow)'} />}
          <path d={pathStr} stroke={color === '#5ac8fa' ? 'rgba(90,200,250,0.25)' : 'rgba(255,159,10,0.25)'} strokeWidth="6" fill="none" strokeLinejoin="round" strokeLinecap="round" />
          <path d={pathStr} stroke={lineColor} strokeWidth="2.5" fill="none" strokeLinejoin="round" strokeLinecap="round" />
          <circle cx={points[0][0]} cy={points[0][1]} r="3" fill={goldColor} stroke="rgba(0,0,0,0.5)" strokeWidth="1" />
          <circle cx={points[points.length-1][0]} cy={points[points.length-1][1]} r="4" fill={endDotColor} stroke="rgba(0,0,0,0.5)" strokeWidth="1" />
          <circle cx={points[points.length-1][0]} cy={points[points.length-1][1]} r="7" fill="none" stroke={endDotColor} strokeWidth="1" opacity="0.4" />
          {yTicks.map((t, i) => <text key={'yt'+i} x={inner.x + inner.w + 6} y={t.y + 3.5} fontSize="8" fill="rgba(160,160,165,0.5)" fontFamily="'JetBrains Mono', monospace">{fmtVal(t.val)}</text>)}
          <text x={inner.x + 2} y={points[0][1] - 8} fontSize="10" fill={textMutedColor} fontFamily="'JetBrains Mono', monospace">{firstVal > 0 ? '+' : ''}{firstVal}</text>
          <text x={points[points.length-1][0]} y={points[points.length-1][1] - 10} fontSize="10" fill={endDotColor} fontFamily="'JetBrains Mono', monospace" textAnchor="end" fontWeight="700">{lastVal > 0 ? '+' : ''}{lastVal}</text>
          {hoverPoint && (
            <>
              <line x1={hoverPoint.x} y1={padT} x2={hoverPoint.x} y2={padT + inner.h} stroke={goldColor} strokeWidth="1.5" opacity="0.6" />
              <circle cx={hoverPoint.x} cy={hoverPoint.y} r="5" fill="none" stroke={goldColor} strokeWidth="2" opacity="0.8" />
              <rect x={Math.max(padL, hoverPoint.x - 45)} y={hoverPoint.y - 28} width="90" height="24" rx="4" fill="rgba(0,0,0,0.8)" stroke={goldColor} strokeWidth="1" />
              <text x={hoverPoint.x} y={hoverPoint.y - 18} fontSize="10" fill={goldColor} fontFamily="'JetBrains Mono', monospace" textAnchor="middle" fontWeight="700">{fmtVal(hoverPoint.value)}</text>
              <text x={hoverPoint.x} y={hoverPoint.y - 8} fontSize="8" fill="rgba(160,160,165,0.8)" fontFamily="'Inter', sans-serif" textAnchor="middle">{hoverTime}</text>
            </>
          )}
          <text x={(padL + width - padR) / 2} y={height - 2} fontSize="8" fill="rgba(160,160,165,0.3)" fontFamily="'Inter', sans-serif" textAnchor="middle">{history.length} pts</text>
        </svg>
      </div>
    );
  };

  // ── Render helper: Line History Sparkline (legacy wrapper) ──
  const renderSparkline = (lineHistory, openLine) => {
    return <SparklineChart lineHistory={lineHistory} openLine={openLine} color="#ff9f0a" dataKey="homeSpread" />;
  };

  // ── Render helper: Total Sparkline ──
  const renderTotalSparkline = (lineHistory, openTotal) => {

  // ── OLD renderSparkline for reference (can be removed) ──
  const renderSparklineOld = (lineHistory, openLine) => {
    if (!lineHistory || lineHistory.length < 1) return null;
    const width = 300, height = 80, padL = 8, padR = 40, padT = 10, padB = 14;
    const inner = { x: padL, y: padT, w: width - padL - padR, h: height - padT - padB };
    // Filter out bogus zero entries that appear before real data
    const openVal = openLine != null ? parseFloat(openLine) : null;
    const filtered = openVal != null ? lineHistory.filter(e => !(e.homeSpread === 0 && openVal !== 0)) : lineHistory;
    const history = filtered.length > 0 ? filtered : lineHistory;
    const spreads = history.map(e => e.homeSpread);
    const goldColor = '#ff9f0a';
    const lineColor = '#e8920a';
    const textMutedColor = '#a0a0a5';
    const uid = 'spark_' + Math.random().toString(36).substr(2, 9);
    const firstVal = spreads[0], lastVal = spreads[spreads.length - 1];
    // Single point — show a dot with the current value
    if (lineHistory.length === 1) {
      return (
        <div style={{textAlign:'center', padding:'4px 0'}}>
          <svg width={width} height={height} viewBox={'0 0 ' + width + ' ' + height} style={{borderRadius: '8px', overflow: 'visible'}}>
            <rect x="0" y="0" width={width} height={height} rx="8" fill="rgba(30,30,34,0.9)" />
            <line x1={padL} y1={height/2} x2={width - padR} y2={height/2} stroke="rgba(255,255,255,0.12)" strokeWidth="1" strokeDasharray="4,3" />
            <circle cx={(padL + width - padR) / 2} cy={height/2} r="4" fill={goldColor} />
            <text x={(padL + width - padR) / 2} y={height/2 - 12} fontSize="11" fill={textMutedColor} fontFamily="'JetBrains Mono', monospace" textAnchor="middle">{firstVal > 0 ? '+' : ''}{firstVal}</text>
            <text x={(padL + width - padR) / 2} y={height - 4} fontSize="9" fill="rgba(160,160,165,0.4)" fontFamily="'Inter', sans-serif" textAnchor="middle">Refresh to build chart</text>
          </svg>
        </div>
      );
    }
    const rawMin = Math.min(...spreads);
    const rawMax = Math.max(...spreads);
    // Baseline at the opening line — dashed line reference
    const baselineVal = openVal != null ? openVal : firstVal;
    // Include the baseline (opening line) in the range so it always fits on screen
    const min = Math.min(rawMin, baselineVal);
    const max = Math.max(rawMax, baselineVal);
    const range = max - min || 1;
    const isFlat = rawMin === rawMax;
    const baselineY = isFlat ? (inner.y + inner.h / 2) : (inner.y + inner.h - ((baselineVal - min) / range) * inner.h);
    const points = history.map((e, i) => {
      const x = inner.x + (i / (history.length - 1)) * inner.w;
      const y = isFlat ? (inner.y + inner.h / 2) : (inner.y + inner.h - ((e.homeSpread - min) / range) * inner.h);
      return [x, y];
    });
    const pathStr = points.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
    // Area fill from line down to baseline (not bottom edge)
    const areaPath = pathStr + 'L' + points[points.length-1][0].toFixed(1) + ',' + baselineY.toFixed(1) + 'L' + inner.x + ',' + baselineY.toFixed(1) + 'Z';
    // Y-axis tick values for right side labels
    const yTicks = [];
    if (!isFlat) {
      const step = range / 3;
      for (let i = 0; i <= 3; i++) {
        const val = max - i * step;
        const y = inner.y + (i / 3) * inner.h;
        yTicks.push({ val, y });
      }
    }
    // End dot color: green if moved up, red if down, gold if flat
    const moved = lastVal - firstVal;
    const endDotColor = moved > 0 ? '#34c759' : moved < 0 ? '#ff453a' : goldColor;
    return (
      <div style={{textAlign:'center', padding:'4px 0'}}>
        <svg width={width} height={height} viewBox={'0 0 ' + width + ' ' + height} style={{borderRadius: '8px', overflow: 'visible'}}>
          <defs>
            <linearGradient id={uid + '_above'} x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor="rgba(255,159,10,0.45)" />
              <stop offset="100%" stopColor="rgba(255,159,10,0.03)" />
            </linearGradient>
            <linearGradient id={uid + '_below'} x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor="rgba(255,159,10,0.03)" />
              <stop offset="100%" stopColor="rgba(255,159,10,0.35)" />
            </linearGradient>
            <clipPath id={uid + '_clipAbove'}>
              <rect x="0" y="0" width={width} height={baselineY.toFixed(1)} />
            </clipPath>
            <clipPath id={uid + '_clipBelow'}>
              <rect x="0" y={baselineY.toFixed(1)} width={width} height={height - baselineY} />
            </clipPath>
          </defs>
          {/* Dark background */}
          <rect x="0" y="0" width={width} height={height} rx="8" fill="rgba(25,25,30,0.95)" />
          {/* Subtle grid lines */}
          {yTicks.map((t, i) => <line key={i} x1={inner.x} y1={t.y.toFixed(1)} x2={inner.x + inner.w} y2={t.y.toFixed(1)} stroke="rgba(255,255,255,0.04)" strokeWidth="1" />)}
          {/* Dashed baseline at opening value */}
          <line x1={inner.x} y1={baselineY.toFixed(1)} x2={inner.x + inner.w} y2={baselineY.toFixed(1)} stroke="rgba(255,255,255,0.18)" strokeWidth="1" strokeDasharray="5,4" />
          {/* Area fill — above baseline */}
          {!isFlat && <path d={areaPath} fill={'url(#' + uid + '_above)'} clipPath={'url(#' + uid + '_clipAbove)'} />}
          {/* Area fill — below baseline */}
          {!isFlat && <path d={areaPath} fill={'url(#' + uid + '_below)'} clipPath={'url(#' + uid + '_clipBelow)'} />}
          {/* Glow behind the line */}
          <path d={pathStr} stroke="rgba(255,159,10,0.25)" strokeWidth="6" fill="none" strokeLinejoin="round" strokeLinecap="round" />
          {/* Main line */}
          <path d={pathStr} stroke={lineColor} strokeWidth="2.5" fill="none" strokeLinejoin="round" strokeLinecap="round" />
          {/* Start dot */}
          <circle cx={points[0][0]} cy={points[0][1]} r="3" fill={goldColor} stroke="rgba(0,0,0,0.5)" strokeWidth="1" />
          {/* End dot — green/red/gold by direction */}
          <circle cx={points[points.length-1][0]} cy={points[points.length-1][1]} r="4" fill={endDotColor} stroke="rgba(0,0,0,0.5)" strokeWidth="1" />
          <circle cx={points[points.length-1][0]} cy={points[points.length-1][1]} r="7" fill="none" stroke={endDotColor} strokeWidth="1" opacity="0.4" />
          {/* Y-axis labels on the right */}
          {yTicks.map((t, i) => <text key={'yt'+i} x={inner.x + inner.w + 6} y={t.y + 3.5} fontSize="8" fill="rgba(160,160,165,0.5)" fontFamily="'JetBrains Mono', monospace">{t.val > 0 ? '+' : ''}{t.val.toFixed(1)}</text>)}
          {/* Start and end value labels */}
          <text x={inner.x + 2} y={points[0][1] - 8} fontSize="10" fill={textMutedColor} fontFamily="'JetBrains Mono', monospace">{firstVal > 0 ? '+' : ''}{firstVal}</text>
          <text x={points[points.length-1][0]} y={points[points.length-1][1] - 10} fontSize="10" fill={endDotColor} fontFamily="'JetBrains Mono', monospace" textAnchor="end" fontWeight="700">{lastVal > 0 ? '+' : ''}{lastVal}</text>
          {/* Point count */}
          <text x={(padL + width - padR) / 2} y={height - 2} fontSize="8" fill="rgba(160,160,165,0.3)" fontFamily="'Inter', sans-serif" textAnchor="middle">{history.length} pts</text>
        </svg>
      </div>
    );

            a.href = url;

            };
            reader.readAsText(file);

            <span className="section-title">Bet History</span>
            <span className="section-badge">{record.w}W - {record.l}L - {record.p}P</span>
          </div>
          {history.length === 0 ? (
            <div className="empty-state">
              <div className="empty-icon">&#128202;</div>
              <div className="empty-title">No bets tracked yet</div>
              <div className="empty-sub">Settle your bets on the BetScore tab</div>
            </div>
          ) : [...history].reverse().map((h, i) => (
            <div className="history-item" key={i}>
              <div>
                <div className="history-game">{h.game}</div>
                <div className="history-detail">{h.date} | {h.side} | BS: {h.betScore}</div>
              </div>
              <span className="history-badge" style={{
                background: h.result === 'win' ? 'var(--green-bg)' : h.result === 'loss' ? 'var(--red-bg)' : 'var(--yellow-bg)',
                color: h.result === 'win' ? 'var(--green)' : h.result === 'loss' ? 'var(--red)' : 'var(--yellow)',
              }}>
                {h.result.toUpperCase()}
              </span>
            </div>
          ))}
          {history.length > 0 && (
            <div style={{padding:'20px',textAlign:'center'}}>
              <button onClick={() => { setHistory([]); setBets({}); }}
                style={{padding:'10px 24px',background:'var(--card)',color:'var(--red)',border:'1px solid var(--red-border)',borderRadius:'var(--radius-sm)',fontSize:'12px',fontWeight:700,cursor:'pointer'}}>
                Clear History
              </button>
            </div>
          )}
        </div>
      )}


      </div>


      <div className="summary-bar">
        <div className="summary-stat"><div className="val c-green">{plays}</div><div className="lbl">Plays</div></div>
        <div className="summary-stat"><div className="val c-yellow">{leans}</div><div className="lbl">Leans</div></div>
        <div className="summary-stat"><div className="val" style={{color:'var(--accent)'}}>{record.w}-{record.l}-{record.p}</div><div className="lbl">Record</div></div>
        <div className="summary-stat">
          <div className="val" style={{color: (record.w - record.l) >= 0 ? 'var(--green)' : 'var(--red)'}}>
            {record.w - record.l >= 0 ? '+' : ''}{record.w - record.l}u
          </div>
          <div className="lbl">Units</div>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Register service worker
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'betscore-v1';
    const ASSETS = ['/'];

    self.addEventListener('install', (e) => {
      e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS)).catch(() => {}));
      self.skipWaiting();
    });

    self.addEventListener('activate', (e) => {
      e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))));
      self.clients.claim();
    });

    self.addEventListener('fetch', (e) => {
      if (e.request.method !== 'GET') return;
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
          if (!resp || resp.status !== 200 || resp.type === 'error') return resp;
          const cache = caches.open(CACHE_NAME);
          cache.then(c => c.put(e.request, resp.clone()));
          return resp;
        }).catch(() => caches.match('/')))
      );
    });
  `;
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
